  ring.rotation.set(r.rot[0],r.rot[1],r.rot[2]); rotateGroup.add(ring);
  const pk=new THREE.Mesh(new THREE.TorusGeometry(ringR,ringTube*3.2,10,64),
                           new THREE.MeshBasicMaterial({visible:false}));
  pk.rotation.copy(ring.rotation); pk.userData.rotAxis=r.key; rotateGroup.add(pk);
  rotatePickers.push(pk);
});

// -- geo group: face-push cubes + edge-slide spheres (single box only) --
// Separate from gizmoRoot: handle POSITIONS are true geometry positions so
// they can't live inside gizmoRoot's distance-based scale; only the handle
// SIZES scale with camera distance (set per-frame in updateGeoHandles).
const geoGroup=new THREE.Group(); geoGroup.visible=false; scene.add(geoGroup);
const geoFaceHandles=[], geoEdgeHandles=[], geoPickers=[];
GEO_FACES.forEach((f,fi)=>{
  const h=new THREE.Mesh(new THREE.BoxGeometry(1,1,1),
                          new THREE.MeshBasicMaterial({color:0xE8A33D}));
  geoGroup.add(h); geoFaceHandles.push(h);
  const p=new THREE.Mesh(new THREE.BoxGeometry(1,1,1),
                          new THREE.MeshBasicMaterial({visible:false}));
  p.userData.geo={type:'gface',fi}; geoGroup.add(p); geoPickers.push(p);
  h.userData.picker=p;
});
GEO_EDGES.forEach((ed,ei)=>{
  const h=new THREE.Mesh(new THREE.SphereGeometry(0.5,10,8),
                          new THREE.MeshBasicMaterial({color:0x46C7D0}));
  geoGroup.add(h); geoEdgeHandles.push(h);
  const p=new THREE.Mesh(new THREE.SphereGeometry(0.5,8,6),
                          new THREE.MeshBasicMaterial({visible:false}));
  p.userData.geo={type:'gedge',ei}; geoGroup.add(p); geoPickers.push(p);
  h.userData.picker=p;
});
// -- vertex handles: 8 corner spheres (Unreal-style select-then-move) --
const geoVertHandles=[], geoVertPickers=[];
for(let vi=0; vi<8; vi++){
  const h=new THREE.Mesh(new THREE.SphereGeometry(0.5,10,8),
                          new THREE.MeshBasicMaterial({color:0xE85AD0}));
  geoGroup.add(h); geoVertHandles.push(h);
  const p=new THREE.Mesh(new THREE.SphereGeometry(0.5,8,6),
                          new THREE.MeshBasicMaterial({visible:false}));
  p.userData.geo={type:'gvert',vi}; geoGroup.add(p); geoVertPickers.push(p);
  h.userData.picker=p;
}
// -- unified GEO element gizmo: select a face/edge/vertex, then an axis gizmo
// appears (1 arrow for a face along its normal, 2 for an edge, 3 for a vertex).
// Lives in the scene (not geoGroup) so it can carry the brush's full
// orientation via quaternion, reusing localAxisToThree like the whole-brush
// move gizmo. Arrow refs are kept so each can be shown/hidden/reoriented.
let geoSub='face';        // 'face' | 'edge' | 'vertex'
let geoSelEl=null;        // selected element index within the current sub-mode, or null
const geoGizmo=new THREE.Group(); geoGizmo.visible=false; scene.add(geoGizmo);
const geoArrows={}; // comp -> {arrow, picker, baseDir}
[{comp:'x',color:0xE8554E},{comp:'y',color:0x5BD15B},{comp:'z',color:0x4F9DFF}].forEach(ax=>{
  // base dir = the local Unreal axis mapped into THREE (U2T of +axis)
  const dir=ax.comp==='x'?new THREE.Vector3(1,0,0):ax.comp==='y'?new THREE.Vector3(0,0,-1):new THREE.Vector3(0,1,0);
  const arrow=new THREE.ArrowHelper(dir,new THREE.Vector3(0,0,0),GZ*0.7,ax.color,GZ*0.2,GZ*0.12);
  geoGizmo.add(arrow);
  const pk=new THREE.Mesh(new THREE.CylinderGeometry(GZ*0.12,GZ*0.12,GZ*0.7,8),
                           new THREE.MeshBasicMaterial({visible:false}));
  pk.userData.vaxis=ax.comp; geoGizmo.add(pk);
  geoArrows[ax.comp]={arrow, picker:pk, baseDir:dir.clone()};
});
const geoAxisPickers=[geoArrows.x.picker, geoArrows.y.picker, geoArrows.z.picker];
// Which local axes an element can move along, and (for a face) the outward sign.
// face: 1 axis (its normal) with sign; edge: the 2 axes perpendicular to it;
// vertex: all 3. Returns {axes:[{comp,sign}], corners:[indices], face?:fd}
function geoElement(){
  const b=selected; const C=b.corners||cornersFromSize(b);
  if(geoSub==='face'){
    const fd=GEO_FACES[geoSelEl];
    return {axes:[{comp:fd.axis,sign:fd.sign}], corners:fd.quad.slice(), face:fd, C};
  }
  if(geoSub==='edge'){
    const ed=GEO_EDGES[geoSelEl];
    const others=['x','y','z'].filter(a=>a!==ed.axis).map(comp=>({comp,sign:1}));
    return {axes:others, corners:[ed.i,ed.j], edge:ed, C};
  }
  return {axes:[{comp:'x',sign:1},{comp:'y',sign:1},{comp:'z',sign:1}], corners:[geoSelEl], C};
}
// world-Three centre of an element's corners (local corners -> world)
function geoElementCentreWorld(b, corners, C){
  let lx=0,ly=0,lz=0; corners.forEach(i=>{lx+=C[i][0];ly+=C[i][1];lz+=C[i][2];});
  const n=corners.length; lx/=n;ly/=n;lz/=n;
  const w=rotUnreal([lx,ly,lz], b.yaw||0, 0, 0);
  return U2T(w[0]+b.pos.x, w[1]+b.pos.y, w[2]+b.pos.z);
}
function geoFlat(b){ return Math.abs(b.pitch||0)<1e-6 && Math.abs(b.roll||0)<1e-6; }
function geoActive(){ return gizmoMode==='geom' && selectedSet.size===1 && selected && selected.type==='box' && geoFlat(selected); }
// local Unreal point -> Three local within geoGroup (group carries yaw+pos)
function L2T(p){ return new THREE.Vector3(p[0], p[2], -p[1]); }
function updateGeoHandles(){
  const b=selected, C=b.corners||cornersFromSize(b);
  geoGroup.position.copy(U2T(b.pos.x,b.pos.y,b.pos.z));
  geoGroup.rotation.y=b.yaw||0;
  const k=Math.max(0.35, orbit.dist/1100);
  const fs=GZ*0.13*k, es=GZ*0.10*k, vs=GZ*0.11*k, ps=1.9; // handle sizes + picker inflation
  const showFace=geoSub==='face', showEdge=geoSub==='edge', showVert=geoSub==='vertex';
  GEO_FACES.forEach((f,fi)=>{
    const q=f.quad.map(i=>C[i]);
    const cx=(q[0][0]+q[1][0]+q[2][0]+q[3][0])/4,
          cy=(q[0][1]+q[1][1]+q[2][1]+q[3][1])/4,
          cz=(q[0][2]+q[1][2]+q[2][2]+q[3][2])/4;
    const h=geoFaceHandles[fi], sel=showFace&&geoSelEl===fi;
    h.visible=showFace; h.userData.picker.visible=showFace;
    h.material.color.set(sel?0xF2F4F8:0xE8A33D);
    h.position.copy(L2T([cx,cy,cz])); h.scale.setScalar(sel?fs*1.35:fs);
    h.userData.picker.position.copy(h.position); h.userData.picker.scale.setScalar(fs*ps);
  });
  GEO_EDGES.forEach((ed,ei)=>{
    const a=C[ed.i], c2=C[ed.j];
    const h=geoEdgeHandles[ei], sel=showEdge&&geoSelEl===ei;
    h.visible=showEdge; h.userData.picker.visible=showEdge;
    h.material.color.set(sel?0xF2F4F8:0x46C7D0);
    h.position.copy(L2T([(a[0]+c2[0])/2,(a[1]+c2[1])/2,(a[2]+c2[2])/2]));
    h.scale.setScalar(sel?es*1.4:es);
    h.userData.picker.position.copy(h.position); h.userData.picker.scale.setScalar(es*ps);
  });
  geoVertHandles.forEach((h,vi)=>{
    const sel=showVert&&geoSelEl===vi;
    h.visible=showVert; h.userData.picker.visible=showVert;
    h.material.color.set(sel?0xF2F4F8:0xE85AD0);
    h.position.copy(L2T(C[vi])); h.scale.setScalar(sel?vs*1.4:vs);
    h.userData.picker.position.copy(h.position); h.userData.picker.scale.setScalar(vs*ps);
  });
  // unified element gizmo at the selected element (1/2/3 arrows by element type)
  const showGizmo=geoSelEl!=null;
  geoGizmo.visible=showGizmo;
  if(showGizmo){
    const el=geoElement();
    geoGizmo.position.copy(geoElementCentreWorld(b, el.corners, C));
    geoGizmo.quaternion.copy(brushThreeQuat(b));
    geoGizmo.scale.setScalar(k);
    // configure which arrows show; a face arrow flips to point outward
    const active={}; el.axes.forEach(a=>active[a.comp]=a.sign);
    ['x','y','z'].forEach(comp=>{
      const g=geoArrows[comp], on=(comp in active);
      g.arrow.visible=on; g.picker.visible=on;
      if(on){
        const sign=active[comp];
        const dir=g.baseDir.clone().multiplyScalar(sign);
        g.arrow.setDirection(dir);
        g.arrow.setLength(GZ*0.7, GZ*0.2, GZ*0.12);
        g.picker.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir);
        g.picker.position.copy(dir.clone().multiplyScalar(GZ*0.35));
      }
    });
  }
}

function updateGizmo(){
  if(!selectedSet.size){ gizmoRoot.visible=false; geoGroup.visible=false; geoGizmo.visible=false; return; }
  gizmoRoot.visible=true;
  const c=selCenter(); gizmoRoot.position.copy(U2T(c.x,c.y,c.z));
  gizmoRoot.scale.setScalar(Math.max(0.35, orbit.dist/1100)); // keep roughly screen-sized
  // Scale handles always track the brush's own axes (scaling BSP is local),
  // so they use the full brush orientation. Move respects the toggle: World =
  // fixed world axes (identity), Local = full brush orientation (all 3 axes,
  // not just yaw — so local move works on pitched/rolled brushes).
  const q=brushThreeQuat(selected);
  scaleGroup.quaternion.copy(q);
  if(gizmoSpace==='local') moveGroup.quaternion.copy(q);
  else moveGroup.quaternion.identity();
  moveGroup.visible=gizmoMode==='move';
  scaleGroup.visible=gizmoMode==='scale';
  rotateGroup.visible=gizmoMode==='rotate';
  const geo=geoActive();
  geoGroup.visible=geo;
  if(geo) updateGeoHandles(); else geoGizmo.visible=false;
}
// closest parameter along an axis line to the pointer ray
function axisParam(origin,dir,rc){
  const O=rc.ray.origin, R=rc.ray.direction;
  const w0=new THREE.Vector3().subVectors(origin,O);
  const b=dir.dot(R), d=dir.dot(w0), e=R.dot(w0), denom=1-b*b;
  // denom -> 0 as the camera's view direction approaches parallel with the
  // drag axis (looking nearly straight down it). Near that point 1/denom
  // amplifies tiny ray noise into huge position jumps — what reads as
  // "jittery". 1e-6 only caught the exact-parallel case; widen the dead
  // zone so it freezes the drag (rather than flinging the brush) whenever
  // the view is within ~8° of axis-parallel.
  if(Math.abs(denom)<0.02) return null;
  return (b*e - d)/denom;
}
const rotatePlane=new THREE.Plane();
// Angle of the pointer within the plane of the given rotation ring, measured
// in THREE space. yaw plane = XZ (normal +Y), pitch plane = XY (normal +Z),
// roll plane = YZ (normal +X). The yaw branch is byte-identical to the old
// single-ring behaviour so existing yaw drags are unchanged.
function rotateAngleAt(px,py,axis){
  let normal, comp;
  if(axis==='pitch'){ normal=new THREE.Vector3(0,0,1); comp='pitch'; }
  else if(axis==='roll'){ normal=new THREE.Vector3(1,0,0); comp='roll'; }
  else { normal=new THREE.Vector3(0,1,0); comp='yaw'; }
  rotatePlane.setFromNormalAndCoplanarPoint(normal, gizmoRoot.position);
  ray.setFromCamera(ndc(px,py), camera);
  const pt=new THREE.Vector3();
  if(!ray.ray.intersectPlane(rotatePlane, pt)) return null;
  const o=gizmoRoot.position;
  if(comp==='yaw')   return Math.atan2(-(pt.z-o.z), pt.x-o.x);
  if(comp==='pitch') return Math.atan2(pt.y-o.y, pt.x-o.x);
  return Math.atan2(pt.z-o.z, pt.y-o.y); // roll
}
let gizmoDrag=null;
function ndc(px,py){const r=el.getBoundingClientRect();return new THREE.Vector2(((px-r.left)/r.width)*2-1, -((py-r.top)/r.height)*2+1);}
function screenPos(worldVec3){
  const v=worldVec3.clone().project(camera);
  const r=el.getBoundingClientRect();
  return {x:(v.x*0.5+0.5)*r.width+r.left, y:(-v.y*0.5+0.5)*r.height+r.top};
}
function gizmoHitAxis(px,py){
  if(!selectedSet.size) return null;
  ray.setFromCamera(ndc(px,py), camera);
  if(gizmoMode==='move'){
    const hits=ray.intersectObjects(movePickers,false);
    return hits.length? {type:'move', axis:hits[0].object.userData.axis} : null;
  }
  if(gizmoMode==='scale'){
    const hits=ray.intersectObjects([...scalePickers, uniformPicker],false); // sorted nearest-first
    if(!hits.length) return null;
    const obj=hits[0].object;
    return obj.userData.uniform ? {type:'uniform'} : {type:'scale', axis:obj.userData.axis};
  }
  if(gizmoMode==='geom'){
    if(!geoActive()) return null;
    // grabbing an axis of the selected element's gizmo takes priority
    if(geoSelEl!=null){
      const ah=ray.intersectObjects(geoAxisPickers.filter(p=>p.visible),false);
      if(ah.length) return {type:'geoaxis', comp:ah[0].object.userData.vaxis};
    }
    // otherwise tap a handle in the active sub-mode to SELECT that element
    const pickers = geoSub==='face'?geoPickers.filter(p=>p.userData.geo.type==='gface')
                 : geoSub==='edge'?geoPickers.filter(p=>p.userData.geo.type==='gedge')
                 : geoVertPickers;
    const hits=ray.intersectObjects(pickers,false);
    if(!hits.length) return null;
    const g=hits[0].object.userData.geo;
    const idx = g.type==='gface'?g.fi : g.type==='gedge'?g.ei : g.vi;
    return {type:'geosel', idx};
  }
  const hits=ray.intersectObjects(rotatePickers,false);
  return hits.length? {type:'rotate', rotAxis:hits[0].object.userData.rotAxis} : null;
}
// Three-space unit direction -> the Unreal-space displacement it represents
// (inverse of U2T). Lets a single rotated drag axis move pos.x AND pos.y
// together, which is what "Local" space dragging actually needs.
function threeDirToUnreal(d){ return {x:d.x, y:-d.z, z:d.y}; }
// A brush's LOCAL Unreal axis (e.g. its own +X) as a world-space THREE unit
// vector, using the SAME rotUnreal the geometry uses — so local-move arrows
// and drag axes line up with the brush's actual faces at any pitch/yaw/roll.
function localAxisToThree(b, ax){
  const v = ax==='x'?[1,0,0]:ax==='y'?[0,1,0]:[0,0,1];
  const r = rotUnreal(v, b.yaw||0, b.pitch||0, b.roll||0); // world Unreal dir
  return new THREE.Vector3(r[0], r[2], -r[1]).normalize();  // -> Three (U2T dir)
}
// Full-rotation THREE quaternion for orienting gizmo visual groups to match a
// brush. Built from the brush's three rotated basis vectors so it can't drift
// from rotUnreal (which a separate Euler-in-Three composition easily would).
function brushThreeQuat(b){
  const X=localAxisToThree(b,'x'), Y=localAxisToThree(b,'y'), Z=localAxisToThree(b,'z');
  // THREE basis: gizmo X uses brush +X, gizmo Y uses brush +Z (Three up),
  // gizmo Z uses brush -Y — matching U2T's axis mapping.
  const m=new THREE.Matrix4().makeBasis(X, Z, Y.clone().negate());
  return new THREE.Quaternion().setFromRotationMatrix(m);
}

function gizmoStart(hit,px,py){
  const yaw=selected?selected.yaw||0:0;
  if(hit.type==='geosel'){
    geoSelEl=hit.idx;            // select element; its gizmo appears next frame
    gizmoDrag=null; buildInspector();
    return;
  }
  if(hit.type==='geoaxis'){
    const b=selected; if(!b||geoSelEl==null) return;
    const el=geoElement(), C=el.C;
    const comp=hit.comp;
    const axDef=el.axes.find(a=>a.comp===comp); if(!axDef) return;
    // outward-signed drag direction (faces flip; edges/vertices are +axis)
    const dir=localAxisToThree(b, comp).multiplyScalar(axDef.sign);
    const origin=geoElementCentreWorld(b, el.corners, C);
    ray.setFromCamera(ndc(px,py),camera);
    gizmoDrag={type:'geoaxis', b, comp, sign:axDef.sign, dir, origin,
               t0:axisParam(origin,dir,ray),
               face:el.face||null, corners:el.corners.slice(),
               baseCorners:(b.corners||cornersFromSize(b)).map(p=>p.slice()),
               size:{...b.size}, pos:{...b.pos},
               wasPristine:!b.corners};
    return;
  }
  if(hit.type==='rotate'){
    const ax=hit.rotAxis||'yaw';
    gizmoDrag={type:'rotate', rotAxis:ax, startAngle:rotateAngleAt(px,py,ax),
               items:[...selectedSet].map(b=>({b, ang:b[ax]||0}))};
    return;
  }
  if(hit.type==='uniform'){
    const sp=screenPos(gizmoRoot.position);
    const startDist=Math.max(20,Math.hypot(px-sp.x,py-sp.y));
    gizmoDrag={type:'uniform', screenOrigin:sp, startDist,
               items:[...selectedSet].map(b=>({b,size:{...b.size},
                 corners:b.corners?b.corners.map(p=>p.slice()):null}))};
    return;
  }
  ray.setFromCamera(ndc(px,py),camera);
  const origin=gizmoRoot.position.clone();
  let dir=hit.axis.dir.clone();
  const useLocal=hit.type==='scale'||(hit.type==='move'&&gizmoSpace==='local');
  if(useLocal){
    // brush's local axis (x/y/z) as a world-Three direction, full rotation
    dir=localAxisToThree(selected, hit.axis.comp);
  }
  gizmoDrag={type:hit.type,ax:hit.axis,origin,dir,t0:axisParam(origin,dir,ray),
             items:[...selectedSet].map(b=>({b,pos:{...b.pos},size:{...b.size},
               corners:b.corners?b.corners.map(p=>p.slice()):null}))};
}
function gizmoMoveTo(px,py){
  if(!gizmoDrag||!selectedSet.size) return;
  if(gizmoDrag.type==='geoaxis'){
    if(gizmoDrag.t0==null) return;
    ray.setFromCamera(ndc(px,py),camera);
    const t=axisParam(gizmoDrag.origin,gizmoDrag.dir,ray);
    if(t==null) return;
    const b=gizmoDrag.b, ai=AXI[gizmoDrag.comp];
    // delta is measured along the (outward-signed) drag dir
    const delta=snap(t-gizmoDrag.t0);
    if(gizmoDrag.face && gizmoDrag.wasPristine){
      // pristine box + face push = asymmetric resize; exact CubeBuilder SURVIVES.
      // dir points outward, so +delta grows. Reuse the proven size+centre math.
      const fd=gizmoDrag.face;
      const ns=Math.max(10,snap(gizmoDrag.size[fd.axis]+delta));
      const actual=ns-gizmoDrag.size[fd.axis];
      b.size[fd.axis]=ns;
      const half=fd.sign*actual/2, yaw=b.yaw||0, c=Math.cos(yaw), s=Math.sin(yaw);
      if(fd.axis==='z'){ b.pos.z=gizmoDrag.pos.z+half; }
      else if(fd.axis==='x'){ b.pos.x=gizmoDrag.pos.x+half*c; b.pos.y=gizmoDrag.pos.y+half*s; }
      else { b.pos.x=gizmoDrag.pos.x-half*s; b.pos.y=gizmoDrag.pos.y+half*c; }
      buildMesh(b); buildInspector(); refreshHUD();
      return;
    }
    // edited box (or edge/vertex): move the controlled corners along the local
    // axis. dir is outward-signed, so the local-coord step is delta*sign.
    const step=delta*gizmoDrag.sign;
    const NC=gizmoDrag.baseCorners.map(p=>p.slice());
    gizmoDrag.corners.forEach(i=>{ NC[i][ai]+=step; });
    if(validateCorners(NC)){ b.corners=NC; buildMesh(b); buildInspector(); refreshHUD(); }
    return;
  }
  if(gizmoDrag.type==='rotate'){
    const ax=gizmoDrag.rotAxis||'yaw';
    const angle=rotateAngleAt(px,py,ax); if(angle==null||gizmoDrag.startAngle==null) return;
    const delta=angle-gizmoDrag.startAngle;
    gizmoDrag.items.forEach(({b,ang})=>{
      b[ax]=snapDeg((ang+delta)*180/Math.PI)*Math.PI/180; buildMesh(b);
    });
    buildInspector(); refreshHUD(); return;
  }
  if(gizmoDrag.type==='uniform'){
    const cur=Math.max(20,Math.hypot(px-gizmoDrag.screenOrigin.x,py-gizmoDrag.screenOrigin.y));
    const ratio=cur/gizmoDrag.startDist;
    gizmoDrag.items.forEach(({b,size,corners})=>{
      b.size.x=Math.max(10,snap(size.x*ratio));
      b.size.y=Math.max(10,snap(size.y*ratio));
      b.size.z=Math.max(10,snap(size.z*ratio));
      if(corners) b.corners=corners.map(p=>p.map(v=>v*ratio));
      buildMesh(b);
    });
    buildInspector(); refreshHUD(); return;
  }
  if(gizmoDrag.t0==null) return;
  ray.setFromCamera(ndc(px,py),camera);
  const t=axisParam(gizmoDrag.origin,gizmoDrag.dir,ray);
  if(t==null) return;
  const delta=t-gizmoDrag.t0;
  if(gizmoDrag.type==='move'){
    const ud=threeDirToUnreal(gizmoDrag.dir);
    gizmoDrag.items.forEach(({b,pos})=>{
      b.pos.x=snap(pos.x+delta*ud.x);
      b.pos.y=snap(pos.y+delta*ud.y);
      b.pos.z=snap(pos.z+delta*ud.z);
      buildMesh(b);
    });
  } else {
    gizmoDrag.items.forEach(({b,size,corners})=>{
      const comp=gizmoDrag.ax.comp;
      const ns=Math.max(10,snap(size[comp]+delta*gizmoDrag.ax.scaleFactor));
      if(corners&&size[comp]>0){
        const r=ns/size[comp], ai=AXI[comp];
        b.corners=corners.map(p=>{const q=p.slice();q[ai]*=r;return q;});
      }
      b.size[comp]=ns;
      buildMesh(b);
    });
  }
  buildInspector(); refreshHUD();
}

let outlinerOpen=false;
function setOutlinerOpen(v){
  outlinerOpen=v;
  document.getElementById('outlinerPanel').classList.toggle('open',v);
  document.getElementById('outlinerBtn').classList.toggle('active',v);
}

function refreshOutliner(){
  const list=document.getElementById('opList');
  if(!list) return;
  document.getElementById('opCount').textContent=brushes.length+' brush'+(brushes.length===1?'':'es');
  if(!brushes.length){
    list.innerHTML='<div class="opEmpty">No brushes.<br>Tap a shape in the palette to add one.</div>';
    return;
  }
  list.innerHTML='';
  brushes.forEach((b,i)=>{
    const isSub=b.op==='sub', vis=b.visible!==false;
    const name=b.name||defaultName(b.type,b.id);
    const item=document.createElement('div');
    item.className='oitem'+(selectedSet.has(b)?' sel':'')+(vis?'':' faded');

    // Left color bar
    const bar=document.createElement('div');
    bar.className='oitem-bar';
    bar.style.background=isSub?'var(--sub)':'var(--add)';

    // Type label
    const type=document.createElement('div');
    type.className='oitem-type';
    type.textContent=b.type.toUpperCase().slice(0,3);

    // Name (tap once on already-selected item to rename)
    const nameEl=document.createElement('div');
    nameEl.className='oitem-name';
    nameEl.textContent=name;
    nameEl.title=name;
    nameEl.onclick=(e)=>{
      e.stopPropagation();
      if(b!==selected){ select(b); return; }
      // Start rename
      const inp=document.createElement('input');
      inp.className='oitem-input'; inp.value=name; inp.maxLength=60;
      nameEl.replaceWith(inp); inp.focus(); inp.select();
      const commit=()=>{
        b.name=inp.value.trim()||defaultName(b.type,b.id);
        pushHistory(); refreshOutliner();
      };
      inp.onblur=commit;
      inp.onkeydown=ev=>{
        if(ev.key==='Enter'){ ev.preventDefault(); commit(); }
        if(ev.key==='Escape') refreshOutliner();
      };
    };

    // Action buttons
    const btns=document.createElement('div'); btns.className='oibtns';

    // Visibility
    const visBtn=document.createElement('button');
    visBtn.className='oibtn'; visBtn.title=vis?'Hide':'Show';
    visBtn.textContent=vis?'●':'○';
    visBtn.onclick=e=>{ e.stopPropagation();
      b.visible=!vis;
      if(b.mesh){ b.mesh.visible=!vis; b.edges.visible=!vis; }
      pushHistory(); refreshOutliner();
    };

    // Up
    const upBtn=document.createElement('button');
    upBtn.className='oibtn'; upBtn.title='Move up'; upBtn.textContent='↑';
    if(i===0) upBtn.disabled=true;
    upBtn.onclick=e=>{ e.stopPropagation();
      [brushes[i-1],brushes[i]]=[brushes[i],brushes[i-1]];
      pushHistory(); refreshOutliner();
    };

    // Down
    const dnBtn=document.createElement('button');
    dnBtn.className='oibtn'; dnBtn.title='Move down'; dnBtn.textContent='↓';
    if(i===brushes.length-1) dnBtn.disabled=true;
    dnBtn.onclick=e=>{ e.stopPropagation();
      [brushes[i],brushes[i+1]]=[brushes[i+1],brushes[i]];
      pushHistory(); refreshOutliner();
    };

    btns.append(visBtn,upBtn,dnBtn);
    item.append(bar,type,nameEl,btns);
    item.onclick=(e)=>{ if(e.target.closest('.oibtns')||e.target.classList.contains('oitem-input')) return;
      if(e.shiftKey) selectToggle(b); else select(b);
    };
    list.appendChild(item);
  });
}

// ---- scene save / load ----
const SK_AUTO='bf_autosave', SK_SCENES='bf_scenes';

function stSave(key,val){ try{localStorage.setItem(key,JSON.stringify(val));return true;}catch(e){return false;} }
function stLoad(key){ try{const v=localStorage.getItem(key);return v?JSON.parse(v):null;}catch(e){return null;} }

function serializeScene(){
  return { v:1, nextId, brushes:brushes.map(({mesh,edges,...d})=>d) };
}
function applySceneData(data){
  if(!data||!Array.isArray(data.brushes)) return false;
  brushes.forEach(b=>{scene.remove(b.mesh);scene.remove(b.edges);});
  brushes.length=0;
  data.brushes.forEach(d=>{brushes.push(d);buildMesh(d);});
  nextId=data.nextId||(brushes.reduce((m,b)=>Math.max(m,b.id),0)+1);
  select(null); hist.length=0; histIdx=-1; pushHistory(); updateHistUI(); refreshHUD(); refreshOutliner();
  return true;
}

// Auto-save: debounced, fires 1.5s after last change
let autoTimer=null;
function scheduleAutoSave(){
  clearTimeout(autoTimer);
  document.getElementById('autoSaveDot').classList.remove('saved');
  autoTimer=setTimeout(()=>{
    stSave(SK_AUTO,{...serializeScene(), date:new Date().toISOString()});
    const dot=document.getElementById('autoSaveDot');
    dot.classList.add('saved');
    document.getElementById('autoSaveLabel').textContent='saved '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  },1500);
}

// Named saves
function getSavedScenes(){ return stLoad(SK_SCENES)||[]; }
function saveNamedScene(name){
  if(!name.trim()) return false;
  const list=getSavedScenes();
  const entry={id:Date.now().toString(), name:name.trim(),
                date:new Date().toISOString(), ...serializeScene()};
  const idx=list.findIndex(s=>s.name===entry.name);
  if(idx>=0) list[idx]=entry; else list.unshift(entry);
  if(list.length>20) list.pop();
  stSave(SK_SCENES,list); return true;
}
function deleteNamedScene(id){
  stSave(SK_SCENES,getSavedScenes().filter(s=>s.id!==id));
}

// ---- CSG display ----
// Real BSP-tree constructive solid geometry (the same class of algorithm UE's
// BSP uses). Each brush is a convex solid; adds are unioned, subs are subtracted.
// Polygons are split precisely against each other's planes, so a small subtract
// carves an accurate hole in a large face instead of removing the whole face.
// Rebuilds are debounced 200ms after mutations.

let csgMesh=null, csgEdges=null, csgTimer=null;
const CSG_EPS=1e-5;

// Unreal world-space point → Three.js coords (same mapping as U2T)
function tv(p){ return {x:p[0], y:p[2], z:-p[1]}; }

// A CSG polygon: {verts:[[x,y,z],...], plane:{n:[x,y,z], w}}  (Unreal space)
function csgPlaneFromFace(face){
  const n=normalOf(face);
  const w=n[0]*face[0][0]+n[1]*face[0][1]+n[2]*face[0][2];
  return {n, w};
}
function csgPolysFromBrush(b){
  return facesFor(b).map(face=>({verts:face.map(p=>[p[0],p[1],p[2]]), plane:csgPlaneFromFace(face)}));
}

// Split polygon by plane into coplanar-front, coplanar-back, front, back lists
function csgSplit(plane, poly, cf, cb, front, back){
  const COPLANAR=0, FRONT=1, BACK=2, SPANNING=3;
  let polyType=0; const types=[];
  for(const v of poly.verts){
    const t=plane.n[0]*v[0]+plane.n[1]*v[1]+plane.n[2]*v[2]-plane.w;
    const type=(t<-CSG_EPS)?BACK:(t>CSG_EPS)?FRONT:COPLANAR;
    polyType|=type; types.push(type);
  }
  if(polyType===COPLANAR){
    const d=plane.n[0]*poly.plane.n[0]+plane.n[1]*poly.plane.n[1]+plane.n[2]*poly.plane.n[2];
    (d>0?cf:cb).push(poly);
  } else if(polyType===FRONT){ front.push(poly); }
  else if(polyType===BACK){ back.push(poly); }
  else { // SPANNING — clip the polygon
    const f=[], bk=[];
    for(let i=0;i<poly.verts.length;i++){
      const j=(i+1)%poly.verts.length;
      const ti=types[i], tj=types[j], vi=poly.verts[i], vj=poly.verts[j];
      if(ti!==BACK) f.push(vi);
      if(ti!==FRONT) bk.push(vi.slice());
      if((ti|tj)===SPANNING){
        const di=plane.n[0]*vi[0]+plane.n[1]*vi[1]+plane.n[2]*vi[2]-plane.w;
        const dj=plane.n[0]*vj[0]+plane.n[1]*vj[1]+plane.n[2]*vj[2]-plane.w;
        const t=di/(di-dj);
        const vm=[vi[0]+(vj[0]-vi[0])*t, vi[1]+(vj[1]-vi[1])*t, vi[2]+(vj[2]-vi[2])*t];
        f.push(vm); bk.push(vm.slice());
      }
    }
    if(f.length>=3) front.push({verts:f, plane:poly.plane});
    if(bk.length>=3) back.push({verts:bk, plane:poly.plane});
  }
}

// BSP node
function csgNode(polys){ const n={plane:null, front:null, back:null, polys:[]}; if(polys&&polys.length) csgBuild(n,polys); return n; }
function csgBuild(node, polys){
  if(!polys.length) return;
  if(!node.plane) node.plane=polys[0].plane;
  const front=[], back=[];
  for(const p of polys) csgSplit(node.plane, p, node.polys, node.polys, front, back);
  if(front.length){ node.front=node.front||csgNode(); csgBuild(node.front, front); }
  if(back.length){ node.back=node.back||csgNode(); csgBuild(node.back, back); }
}
function csgInvert(node){
  for(const p of node.polys){ p.verts.reverse(); p.plane={n:[-p.plane.n[0],-p.plane.n[1],-p.plane.n[2]], w:-p.plane.w}; }
  if(node.plane) node.plane={n:[-node.plane.n[0],-node.plane.n[1],-node.plane.n[2]], w:-node.plane.w};
  const t=node.front; node.front=node.back; node.back=t;
  if(node.front) csgInvert(node.front);
  if(node.back) csgInvert(node.back);
}
function csgClipPolys(node, polys){
  if(!node.plane) return polys.slice();
  let front=[], back=[];
  for(const p of polys) csgSplit(node.plane, p, front, back, front, back);
  if(node.front) front=csgClipPolys(node.front, front);
  back = node.back ? csgClipPolys(node.back, back) : [];
  return front.concat(back);
}
function csgClipTo(node, bsp){
  node.polys=csgClipPolys(bsp, node.polys);
  if(node.front) csgClipTo(node.front, bsp);
  if(node.back) csgClipTo(node.back, bsp);
}
function csgAll(node){
  let polys=node.polys.slice();
  if(node.front) polys=polys.concat(csgAll(node.front));
  if(node.back) polys=polys.concat(csgAll(node.back));
  return polys;
}
function csgUnion(a,b){
  csgClipTo(a,b); csgClipTo(b,a);
  csgInvert(b); csgClipTo(b,a); csgInvert(b);
  csgBuild(a, csgAll(b));
  return a;
}
function csgSubtract(a,b){
  csgInvert(a);
  csgClipTo(a,b); csgClipTo(b,a);
  csgInvert(b); csgClipTo(b,a); csgInvert(b);
  csgBuild(a, csgAll(b));
  csgInvert(a);
  return a;
}

function rebuildCsg(){
  if(csgMesh){ scene.remove(csgMesh); csgMesh=null; }
  if(csgEdges){ scene.remove(csgEdges); csgEdges=null; }

  const active=brushes.filter(b=>b.visible!==false);
  const firstAdd=active.findIndex(b=>b.op==='add');
  if(firstAdd<0){ updateBrushFills(); return; }

  // Process in brush order (top of outliner = first / lowest priority).
  // Each add unions into the result; each sub carves whatever came before it.
  // A sub only affects earlier brushes — an add placed after a sub fills back in.
  // This matches UE4.27's BSP brush order (later brushes override earlier ones).
  let result=csgNode(csgPolysFromBrush(active[firstAdd]));
  for(let i=firstAdd+1;i<active.length;i++){
    const node=csgNode(csgPolysFromBrush(active[i]));
    result = active[i].op==='sub' ? csgSubtract(result,node) : csgUnion(result,node);
  }

  const polys=csgAll(result);
  const pos=[], nor=[];
  for(const p of polys){
    const v=p.verts.map(tv);            // Unreal → Three
    const n=p.plane.n, nt={x:n[0], y:n[2], z:-n[1]};
    for(let i=1;i<v.length-1;i++){        // fan-triangulate
      [v[0],v[i],v[i+1]].forEach(pt=>{ pos.push(pt.x,pt.y,pt.z); nor.push(nt.x,nt.y,nt.z); });
    }
  }

  if(pos.length){
    const g=new THREE.BufferGeometry();
    g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
    g.setAttribute('normal',new THREE.Float32BufferAttribute(nor,3));
    csgMesh=new THREE.Mesh(g,new THREE.MeshStandardMaterial({
      color:0x7FA8BE, roughness:0.82, metalness:0.04, side:THREE.DoubleSide
    }));
    csgMesh.renderOrder=0; scene.add(csgMesh);

    const eg=new THREE.EdgesGeometry(g,15);
    csgEdges=new THREE.LineSegments(eg,new THREE.LineBasicMaterial({color:0x3E6A8A, transparent:true, opacity:0.5}));
    csgEdges.renderOrder=1; scene.add(csgEdges);
  }

  updateBrushFills();
}

// When CSG result exists, hide individual mesh fills (keep edges for selection).
// Selected brushes get a subtle highlight so you know what you're editing.
function updateBrushFills(){
  brushes.forEach(b=>{
    if(!b.mesh) return;
    const isSel=selectedSet.has(b), vis=b.visible!==false;
    if(csgMesh){
      b.mesh.visible=vis&&isSel;
      if(isSel){ b.mesh.material.opacity=0.22; b.mesh.renderOrder=2; }
    } else {
      b.mesh.visible=vis;
      b.mesh.material.opacity=b.op==='sub'?0.18:0.55;
      b.mesh.renderOrder=0;
    }
    b.edges.visible=vis;
  });
}

function scheduleCsg(){
  clearTimeout(csgTimer);
  csgTimer=setTimeout(rebuildCsg,200);
}

// ---- boot ----
document.getElementById('verBadge').textContent='v'+VERSION;
function loop(){requestAnimationFrame(loop);updateGizmo();renderer.render(scene,camera);}
resize(); updateCamera(); buildInspector(); refreshHUD();

// Restore auto-save on startup, or start with a default box
const autoSaveData=stLoad(SK_AUTO);
if(autoSaveData&&autoSaveData.brushes&&autoSaveData.brushes.length>0){
  applySceneData(autoSaveData);
  const t=autoSaveData.date?new Date(autoSaveData.date).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'';
  document.getElementById('autoSaveLabel').textContent='restored '+(t||'last session');
  document.getElementById('autoSaveDot').classList.add('saved');
  toast('Session restored');
} else {
  addBrush('box'); select(brushes[0]);
  updateHistUI();
}

// Patch pushHistory to schedule auto-save, outliner refresh, and CSG rebuild on every mutation
const _ph=pushHistory;
window.pushHistory=pushHistory=function(){
  _ph();
  scheduleAutoSave();
  refreshOutliner();
  scheduleCsg();
};

scheduleCsg(); // initial build
loop();

</script>
