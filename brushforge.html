<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>BrushForge v0.11.0 — UE4.27 Blockout</title>
<style>
  :root{
    --bg:#101216; --panel:#181B22; --panel2:#1F232C; --line:#2A2F3A;
    --ink:#E6E9EF; --dim:#8B93A3; --faint:#5A6273;
    --add:#E8A33D; --sub:#46C7D0; --sel:#F2F4F8; --warn:#E2654E;
    --mono:'SFMono-Regular',ui-monospace,'Menlo','Consolas',monospace;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:var(--sans);}
  #app{position:fixed;inset:0;display:flex;flex-direction:column;}
  #view{position:relative;flex:1;min-height:0;touch-action:none;}
  canvas{display:block;width:100%;height:100%;}

  /* Top toolbar */
  #top{display:flex;align-items:center;gap:8px;padding:10px 12px;
       background:linear-gradient(#181B22,#14171D);border-bottom:1px solid var(--line);
       padding-top:calc(10px + env(safe-area-inset-top));}
  .brand{font-family:var(--mono);font-size:13px;letter-spacing:.18em;color:var(--ink);font-weight:600;}
  #verBadge{font-size:9px;letter-spacing:.08em;color:var(--faint);margin-left:7px;font-weight:400;vertical-align:top;}
  .brand b{color:var(--add);}
  .spacer{flex:1;}
  .seg{display:flex;background:var(--panel2);border:1px solid var(--line);border-radius:9px;overflow:hidden;}
  .labeledSeg{display:flex;align-items:center;gap:7px;}
  .labeledSeg label{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--faint);}
  .snapPicker{display:flex;align-items:center;gap:7px;background:var(--panel2);border:1px solid var(--line);
              border-radius:9px;padding:0 10px 0 12px;}
  .snapPicker label{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--faint);}
  .snapPicker select{background:transparent;border:0;color:var(--ink);font-family:var(--mono);
                      font-size:13px;font-weight:600;padding:8px 2px;}
  .snapPicker select:focus{outline:none;}
  .seg button{border:0;background:transparent;color:var(--dim);font-family:var(--mono);
              font-size:12px;padding:7px 11px;min-width:44px;}
  .seg button.on{background:var(--add);color:#1a1206;font-weight:600;}
  .seg.sub button.on{background:var(--sub);color:#04262a;}
  .histBtn{border:0;background:transparent;color:var(--dim);padding:7px 10px;display:flex;align-items:center;}
  .histBtn svg{width:15px;height:15px;}
  .histBtn:disabled{opacity:0.28;pointer-events:none;}
  .histBtn:not(:disabled):active{color:var(--add);}

  /* Primitive palette */
  #palette{position:absolute;left:12px;top:12px;display:flex;flex-direction:column;gap:8px;z-index:5;}
  .tool{width:56px;height:56px;border-radius:12px;border:1px solid var(--line);
        background:rgba(24,27,34,.82);backdrop-filter:blur(8px);color:var(--ink);
        display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;}
  .tool svg{width:24px;height:24px;}
  .tool span{font-family:var(--mono);font-size:9px;letter-spacing:.06em;color:var(--dim);}
  .tool:active{border-color:var(--add);}

  /* View HUD */
  #hud{position:absolute;right:12px;top:12px;text-align:right;font-family:var(--mono);
       font-size:11px;color:var(--faint);line-height:1.5;z-index:5;pointer-events:none;}
  #hud b{color:var(--dim);}

  /* Floating selection toolbar */
  #selbar{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);
          display:none;align-items:center;gap:10px;z-index:8;
          max-width:calc(100% - 24px);flex-wrap:wrap;justify-content:center;row-gap:8px;}
  #selbar.show{display:flex;}
  .selGroup{display:flex;align-items:center;gap:8px;}
  .selDivider{width:1px;align-self:stretch;min-height:30px;background:var(--line);}
  .sbtn{display:flex;align-items:center;gap:7px;border:1px solid var(--line);
        background:rgba(28,31,38,.94);backdrop-filter:blur(10px);color:var(--ink);
        font-family:var(--sans);font-size:13px;font-weight:600;padding:11px 15px;border-radius:12px;
        box-shadow:0 6px 20px rgba(0,0,0,.35);}
  .sbtn svg{width:16px;height:16px;}
  .sbtn.danger{color:var(--warn);}
  .sbtn:active{border-color:var(--add);transform:translateY(1px);}
  .sbtn.icon{padding:11px;gap:0;}
  .sbtn.icon svg{width:18px;height:18px;}

  .modeSeg{display:flex;border:1px solid var(--line);background:rgba(28,31,38,.94);
            backdrop-filter:blur(10px);border-radius:12px;overflow:hidden;
            box-shadow:0 6px 20px rgba(0,0,0,.35);}
  .modeSeg button{border:0;background:transparent;color:var(--dim);font-family:var(--mono);
                    font-size:11px;letter-spacing:.06em;padding:11px 13px;}
  .modeSeg button.on{background:var(--sel);color:#15171c;font-weight:700;}

  /* Inspector */
  #insp{background:var(--panel);border-top:1px solid var(--line);
        max-height:46vh;overflow-y:auto;-webkit-overflow-scrolling:touch;
        padding-bottom:calc(8px + env(safe-area-inset-bottom));}
  .ihead{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--line);
         position:sticky;top:0;background:var(--panel);z-index:2;}
  .swatch{width:12px;height:12px;border-radius:3px;}
  .ititle{font-family:var(--mono);font-size:13px;letter-spacing:.04em;}
  .ititle small{color:var(--faint);}
  .ibody{padding:12px 14px;display:grid;grid-template-columns:1fr 1fr;gap:10px 14px;}
  .field{display:flex;flex-direction:column;gap:5px;}
  .field.full{grid-column:1 / -1;}
  .sec{padding:10px 0 0;}
  .sec label{color:var(--ink);opacity:.7;font-size:11px;letter-spacing:.16em;text-transform:uppercase;}
  .field label{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--faint);text-transform:uppercase;}
  .row{display:flex;gap:8px;align-items:stretch;}
  .num{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:8px;color:var(--ink);
       font-family:var(--mono);font-size:15px;padding:9px 10px;width:100%;}
  .num:focus{outline:none;border-color:var(--add);}
  .step{width:38px;border:1px solid var(--line);background:var(--panel2);color:var(--dim);
        font-size:18px;border-radius:8px;}
  .step:active{color:var(--add);}
  .empty{padding:26px 14px;text-align:center;color:var(--faint);font-family:var(--mono);font-size:12px;line-height:1.6;}
  .btn{border:1px solid var(--line);background:var(--panel2);color:var(--ink);font-family:var(--sans);
       font-size:13px;font-weight:600;padding:11px 14px;border-radius:10px;}
  .btn.primary{background:var(--add);color:#1a1206;border-color:transparent;}
  .btn.ghost{background:transparent;color:var(--dim);}
  .btn.danger{color:var(--warn);border-color:#3a2622;background:#1e1614;}
  .actions{display:flex;gap:8px;padding:0 14px 12px;}
  .actions .btn{flex:1;}

  /* Export modal */
  #exportOverlay{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(3px);
                 z-index:30;display:none;align-items:flex-end;justify-content:center;}
  #exportOverlay.open{display:flex;}
  #drawer{background:var(--panel);border-radius:20px 20px 0 0;border-top:2px solid var(--add);
          width:100%;max-height:82vh;display:flex;flex-direction:column;
          padding-bottom:env(safe-area-inset-bottom);}
  .dhead{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line);}
  .dhead .ititle{flex:1;font-family:var(--mono);font-size:13px;letter-spacing:.04em;}
  .dhead .ititle small{color:var(--faint);}
  #dclose{width:36px;height:36px;border-radius:50%;border:1px solid var(--line);background:var(--panel2);
          color:var(--dim);font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  #dclose:active{border-color:var(--warn);color:var(--warn);}
  .dactions{display:flex;gap:8px;padding:12px 16px 6px;}
  .dactions .btn{flex:1;}
  .dhint{padding:4px 16px 8px;font-size:12px;color:var(--dim);line-height:1.5;}
  .dhint b{color:var(--ink);}
  .diag{margin:0 16px 10px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;overflow:hidden;}
  .diag-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--line);}
  .diag-bar span{font-family:var(--mono);font-size:11px;color:var(--faint);flex:1;}
  .diag-bar button{font-family:var(--mono);font-size:11px;padding:5px 10px;border:1px solid var(--line);
                    border-radius:7px;background:var(--panel);color:var(--dim);}
  .diag-bar button:active{border-color:var(--add);color:var(--add);}
  pre#t3d, textarea#t3d{margin:0;padding:10px 12px;overflow:auto;-webkit-overflow-scrolling:touch;
          font-family:var(--mono);font-size:10px;line-height:1.5;color:var(--dim);
          white-space:pre;max-height:22vh;background:transparent;border:0;
          width:100%;resize:none;outline:none;}
  .pill{font-family:var(--mono);font-size:10px;color:var(--faint);border:1px solid var(--line);
        padding:3px 7px;border-radius:20px;}
  .dactions{display:flex;gap:8px;padding:12px 14px 4px;}
  .dactions .btn{flex:1;}
  .dhint{padding:6px 14px 10px;font-family:var(--sans);font-size:12px;color:var(--dim);line-height:1.5;}
  .dhint b{color:var(--ink);font-weight:600;}

  /* Outliner panel — right-side slide-in */
  #outlinerPanel{position:absolute;top:0;right:0;width:240px;height:100%;
                 background:var(--panel);border-left:1px solid var(--line);
                 display:flex;flex-direction:column;z-index:9;
                 transform:translateX(100%);transition:transform .22s cubic-bezier(.2,.8,.2,1);}
  #outlinerPanel.open{transform:translateX(0);}
  .opHead{display:flex;align-items:center;gap:8px;padding:11px 12px;
          border-bottom:1px solid var(--line);flex-shrink:0;}
  .opHead span{font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--dim);flex:1;}
  .opHead small{font-family:var(--mono);font-size:10px;color:var(--faint);}
  #opList{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .opEmpty{padding:24px 14px;text-align:center;color:var(--faint);font-family:var(--mono);font-size:11px;line-height:1.6;}
  .oitem{display:flex;align-items:center;cursor:pointer;
         border-bottom:1px solid var(--line);min-height:44px;transition:background .1s;}
  .oitem:hover{background:rgba(255,255,255,.03);}
  .oitem.sel{background:rgba(242,244,248,.06);}
  .oitem.sel .oitem-name{color:var(--sel);}
  .oitem.faded .oitem-name,.oitem.faded .oitem-type{opacity:.35;}
  .oitem-bar{width:3px;align-self:stretch;flex-shrink:0;}
  .oitem-type{font-family:var(--mono);font-size:9px;letter-spacing:.04em;color:var(--faint);
              padding:0 5px;width:26px;text-align:center;flex-shrink:0;}
  .oitem-name{flex:1;font-size:13px;color:var(--ink);padding:4px 4px 4px 2px;
              white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
  .oitem-input{flex:1;background:var(--panel2);border:1px solid var(--add);border-radius:4px;
               color:var(--ink);font-size:13px;padding:3px 6px;min-width:0;margin:0 4px;}
  .oitem-input:focus{outline:none;}
  .oibtns{display:flex;align-items:center;flex-shrink:0;padding-right:3px;}
  .oibtn{width:26px;height:44px;border:0;background:transparent;color:var(--faint);
         font-size:12px;display:flex;align-items:center;justify-content:center;}
  .oibtn:not(:disabled):hover{color:var(--ink);}
  .oibtn:disabled{opacity:.18;pointer-events:none;}
  #outlinerBtn.active{border-color:var(--add);color:var(--add);}

  #marquee{position:absolute;display:none;border:1px solid var(--sel);
           background:rgba(242,244,248,.12);pointer-events:none;z-index:6;}

  #toast{position:absolute;left:50%;bottom:18px;transform:translate(-50%,20px);opacity:0;
         background:#11241f;border:1px solid #1f6f4f;color:#8df0c4;font-family:var(--mono);font-size:12px;
         padding:9px 14px;border-radius:24px;transition:all .25s;z-index:40;pointer-events:none;}
  #toast.show{opacity:1;transform:translate(-50%,0);}

  /* Scenes modal — reuses overlay pattern */
  #scenesOverlay{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(3px);
                 z-index:30;display:none;align-items:center;justify-content:center;}
  #scenesOverlay.open{display:flex;}
  #scenesModal{background:var(--panel);border:1px solid var(--line);border-radius:16px;
               width:min(420px,calc(100% - 32px));max-height:82vh;display:flex;flex-direction:column;overflow:hidden;}
  .shead{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line);}
  .shead h2{margin:0;font-size:14px;font-family:var(--mono);letter-spacing:.06em;font-weight:600;flex:1;}
  #sclose{width:32px;height:32px;border-radius:50%;border:1px solid var(--line);background:var(--panel2);
           color:var(--dim);font-size:16px;display:flex;align-items:center;justify-content:center;}
  .ssavebar{display:flex;gap:8px;padding:12px 16px;border-bottom:1px solid var(--line);}
  .ssavebar input{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:8px;
                   color:var(--ink);font-family:var(--sans);font-size:14px;padding:9px 12px;}
  .ssavebar input:focus{outline:none;border-color:var(--add);}
  .ssavebar input::placeholder{color:var(--faint);}
  .slist{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;}
  .sitem{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line);}
  .sitem:last-child{border-bottom:0;}
  .sitem-info{flex:1;min-width:0;}
  .sitem-name{font-size:14px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sitem-meta{font-family:var(--mono);font-size:11px;color:var(--faint);margin-top:2px;}
  .sitem-btns{display:flex;gap:6px;flex-shrink:0;}
  .sitem-btns button{font-size:12px;font-weight:600;padding:6px 11px;border:1px solid var(--line);
                       border-radius:7px;background:var(--panel2);color:var(--dim);}
  .sitem-btns button.load{color:var(--add);border-color:rgba(232,163,61,.35);}
  .sitem-btns button.del{color:var(--warn);border-color:rgba(226,101,78,.25);}
  .sitem-btns button:active{opacity:.7;}
  .sempty{padding:32px 16px;text-align:center;color:var(--faint);font-family:var(--mono);font-size:12px;}
  .sautosave{display:flex;align-items:center;gap:12px;padding:10px 16px;background:rgba(232,163,61,.07);
              border-bottom:1px solid var(--line);}
  .sautosave span{flex:1;font-size:12px;color:var(--dim);}
  .sautosave b{color:var(--add);}
  #autoSaveDot{width:7px;height:7px;border-radius:50%;background:var(--faint);flex-shrink:0;}
  #autoSaveDot.saved{background:#5BD15B;}
</style>
</head>
<body>
<div id="app">
  <div id="top">
    <div class="brand"><b>BRUSH</b>FORGE<span id="verBadge"></span></div>
    <div class="spacer"></div>
    <div class="snapPicker">
      <label for="snapSel">SNAP</label>
      <select id="snapSel">
        <option value="1">1</option>
        <option value="5">5</option>
        <option value="10" selected>10</option>
        <option value="25">25</option>
        <option value="50">50</option>
        <option value="100">100</option>
        <option value="250">250</option>
        <option value="500">500</option>
        <option value="1000">1000</option>
      </select>
    </div>
    <div class="snapPicker">
      <label for="rotSnapSel">ROT</label>
      <select id="rotSnapSel">
        <option value="1">1°</option>
        <option value="5">5°</option>
        <option value="10">10°</option>
        <option value="15" selected>15°</option>
        <option value="30">30°</option>
        <option value="45">45°</option>
        <option value="90">90°</option>
      </select>
    </div>
    <div class="labeledSeg">
      <label>NEW</label>
      <div class="seg" id="opSeg">
        <button data-op="add" class="on">ADD</button>
        <button data-op="sub">SUBTRACT</button>
      </div>
    </div>
    <div class="seg">
      <button id="undoBtn" class="histBtn" title="Undo (Cmd+Z)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 10h10a5 5 0 0 1 0 10H9"/><path d="M3 10l4-4-4-4"/></svg>
      </button>
      <button id="redoBtn" class="histBtn" title="Redo (Cmd+Shift+Z)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 10H11a5 5 0 0 0 0 10h4"/><path d="M21 10l-4-4 4-4"/></svg>
      </button>
    </div>
    <button id="outlinerBtn" class="btn" title="Toggle Outliner">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1.5"/><circle cx="3" cy="12" r="1.5"/><circle cx="3" cy="18" r="1.5"/></svg>
    </button>
    <button id="scenesBtn" class="btn">Scenes</button>
    <button id="exportBtn" class="btn primary">Export ↗</button>
  </div>

  <div id="view">
    <div id="palette"></div>
    <div id="hud"></div>
    <div id="toast"></div>
    <div id="marquee"></div>
    <div id="selbar">
      <div class="selGroup">
        <div class="modeSeg" id="spaceSeg">
          <button data-space="world" class="on" title="World space">WORLD</button>
          <button data-space="local" title="Local space">LOCAL</button>
        </div>
        <div class="modeSeg" id="gizmoSeg">
          <button data-mode="move" class="on" title="Move">MOVE</button>
          <button data-mode="rotate" title="Rotate">ROTATE</button>
          <button data-mode="scale" title="Scale">SCALE</button>
          <button data-mode="geom" title="Push faces / slide edges / move vertices (single box only)">GEO</button>
        </div>
        <div class="modeSeg" id="geoSubSeg" style="display:none">
          <button data-sub="face" class="on" title="Push faces">FACE</button>
          <button data-sub="edge" title="Slide edges">EDGE</button>
          <button data-sub="vertex" title="Move vertices">VERT</button>
        </div>
      </div>
      <div class="selDivider"></div>
      <div class="selGroup">
        <button id="groundBtn" class="sbtn icon" title="Drop to the surface (or floor) below">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 3v12M7 10l5 5 5-5"/><path d="M4 20h16"/></svg>
        </button>
        <button id="dupBtn" class="sbtn icon" title="Duplicate">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M4 16V4h12"/></svg>
        </button>
        <button id="delBtn" class="sbtn icon danger" title="Delete">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M5 7h14M10 7V4h4v3M6 7l1 13h10l1-13"/></svg>
        </button>
      </div>
    </div>
    <!-- Outliner -->
    <div id="outlinerPanel">
      <div class="opHead">
        <span>OUTLINER</span>
        <small id="opCount"></small>
      </div>
      <div style="padding:6px 12px;font-family:var(--mono);font-size:9px;color:var(--faint);border-bottom:1px solid var(--line);line-height:1.4">
        Top → bottom = CSG order.<br>Subtracts only cut brushes above them.
      </div>
      <div id="opList"></div>
    </div>

    <div id="exportOverlay">
      <div id="drawer">
        <div class="dhead">
          <span class="swatch" style="background:var(--add)"></span>
          <div class="ititle">Export to Unreal <small id="dcount"></small></div>
          <div class="modeSeg" id="exportScopeSeg" style="display:none">
            <button data-scope="all" class="on" title="Export all brushes">ALL</button>
            <button data-scope="sel" title="Export selected only">SELECTED</button>
          </div>
          <button id="dclose" title="Close">✕</button>
        </div>
        <div class="dactions">
          <button class="btn primary" id="dshare">Share / Save to Cloud</button>
          <button class="btn" id="demail">Email to self</button>
          <button class="btn" id="dcopy">Copy</button>
        </div>
        <div class="dhint" id="dhint"></div>
        <div class="diag">
          <div class="diag-bar">
            <span id="diagInfo">—</span>
            <button id="diagSelectAll">Select All</button>
          </div>
          <textarea id="t3d" readonly spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
        </div>
      </div>
    </div>
  </div>

  <div id="insp">
    <div class="ihead">
      <span class="swatch" id="iswatch" style="background:var(--faint)"></span>

    </div>

  </div>

  <!-- Scenes modal -->
  <div id="scenesOverlay">
    <div id="scenesModal">
      <div class="shead">
        <div id="autoSaveDot"></div>
        <h2>SCENES</h2>
        <span id="autoSaveLabel" style="font-size:11px;color:var(--faint);font-family:var(--mono)"></span>
        <button id="sclose">✕</button>
      </div>
      <div class="ssavebar">

        <button class="btn primary" id="sSaveBtn">Save</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ============================================================
   BrushForge — UE4.27 CSG blockout, touch-first.
   Brush data is authored in UNREAL coordinates (X fwd, Y right,
   Z up; left-handed; units = uu/cm). Display maps to Three.js
   (Y up) only for rendering; export uses raw Unreal coords.
   ------------------------------------------------------------
   CHANGELOG
   0.11.0 Unified GEO interaction: face and edge now work like vertex — tap
          an element to select it, then an axis-constrained gizmo appears
          (1 arrow for a face along its normal, 2 for an edge, 3 for a
          vertex). Replaces the old direct-drag on face/edge handles. Edge
          editing is now axis-constrained (was free-plane drag). Pristine-box
          face push still stays parametric (exact CubeBuilder preserved);
          convexity validation and the flat-box gate are unchanged.
   0.10.0 Export selected only: when brushes are selected, the export drawer
          shows an All/Selected toggle (defaults to Selected). buildT3D takes
          an optional brush list; scoped export keeps contiguous object
          indices and CRLF. No selection → toggle hidden, exports all as before.
   0.9.0  GEO vertex translation (Unreal-style): tap a corner to select it,
          then drag a 3-axis move gizmo to translate it one axis at a time.
          GEO now has a Face/Edge/Vertex sub-toggle (shows one handle set at
          a time instead of face+edge together). Vertex moves are convexity-
          validated and create the same b.corners edited-geometry as edge
          slide (PolyList-only export). Reuses localAxisToThree/axisParam/
          validateCorners from prior versions. Flat-box gate unchanged.
   0.8.1  Local/World gizmo now works on pitched/rolled brushes. Local-space
          move handles and their drag axes track the brush's true facing at
          any orientation (was yaw-only), via localAxisToThree/brushThreeQuat
          built on rotUnreal so visuals + drag + geometry stay consistent.
          Yaw-only brushes are unchanged (verified identical). GEO mode stays
          gated to flat brushes — its local transforms are still yaw-only.
   0.8.0  Full 3-axis rotation (pitch/roll added to yaw). Single shared
          rotUnreal() applies UE's FRotator order (yaw→pitch→roll) for both
          display and export; rotation rides RelativeRotation on the
          component, so pristine boxes keep their exact CubeBuilder at any
          orientation. Rotate gizmo now has 3 colour-coded rings; inspector
          has yaw/pitch/roll fields. GEO mode + ground-snap are gated to
          flat (yaw-only) brushes — they toast and no-op on tilted brushes,
          since their local transforms are still yaw-only (a scope-2 item).
          Save format gains pitch/roll (additive; old saves load unchanged).
   0.7.1  Fix: undo/redo didn't rebuild the combined CSG mesh — the blue
          result stayed on pre-undo geometry while per-brush meshes moved.
          applySnapshot now calls scheduleCsg (undo/redo bypass the
          pushHistory patch that normally triggers it).
   0.7.0  Two-finger tap = undo. A quick, near-stationary two-finger tap
          undoes; any real pan/pinch (movement >12px or >300ms) is unaffected.
          Fires exactly once whether fingers lift together or one at a time.
   0.6.0  GEO mode: box face push + edge slide (single box selection).
          Face push on a pristine box stays parametric — asymmetric resize,
          exact CubeBuilder export survives. Edge slide creates b.corners
          (8 local points) and the brush exports PolyList-only (same known
          limitation as ramp). Non-planar quads auto-triangulate on the
          convex diagonal; every drag is convexity-validated (invalid moves
          rejected). Inspector shows edited state + reset-to-box.
   0.5.0  Marquee (box) select: hold ~300ms then drag on empty space to
          box-select multiple brushes at once. A quick drag still orbits,
          unchanged. Long-press-without-moving still toggles a single brush
          (unchanged). Replace-only for now — no additive/subtractive drag.
   0.4.0  Real BSP-tree CSG display with UE-style brush order
          (subtracts only cut brushes above them in the outliner).
          Multi-select (shift/long-press/Ctrl+A), outliner panel,
          save/load scenes + autosave, undo/redo. T3D export
          verified against UE4.27 (CRLF endings, centre-anchored Z).
   ============================================================ */

// ---- version ----
const VERSION = "0.11.0";

// ---- config ----
const SNAP = {value:10};
const ROT_SNAP = {value:15};

// ---- history (undo/redo) ----
const MAX_HIST=60;
const hist=[];       // array of JSON snapshots
let histIdx=-1;      // points to current snapshot

function snapshotBrushes(){
  // Serialise only plain data — strip Three.js mesh/edges objects
  return JSON.stringify(brushes.map(({mesh,edges,...d})=>d));
}
function pushHistory(){
  // Discard any redo branch ahead of the current index
  hist.splice(histIdx+1);
  hist.push(snapshotBrushes());
  if(hist.length>MAX_HIST) hist.shift(); else histIdx++;
  updateHistUI();
}
function applySnapshot(snap){
  const data=JSON.parse(snap);
  brushes.forEach(b=>{scene.remove(b.mesh);scene.remove(b.edges);});
  brushes.length=0;
  data.forEach(d=>{brushes.push(d);buildMesh(d);});
  nextId=brushes.reduce((m,b)=>Math.max(m,b.id),0)+1;
  const selId=selected?selected.id:null;
  selected=selId?brushes.find(b=>b.id===selId)||null:null;
  select(selected); refreshHUD();
  scheduleCsg(); // rebuild the combined CSG mesh — undo/redo bypass pushHistory's patch
}
function undo(){
  if(histIdx<=0) return;
  histIdx--;
  applySnapshot(hist[histIdx]);
  updateHistUI(); toast('Undo');
}
function redo(){
  if(histIdx>=hist.length-1) return;
  histIdx++;
  applySnapshot(hist[histIdx]);
  updateHistUI(); toast('Redo');
}
function updateHistUI(){
  const u=document.getElementById('undoBtn'), r=document.getElementById('redoBtn');
  if(u) u.disabled=(histIdx<=0);
  if(r) r.disabled=(histIdx>=hist.length-1);
}
const COL = {add:0xE8A33D, sub:0x46C7D0, sel:0xF2F4F8};
let currentOp = 'add';

// ---- scene ----
const view = document.getElementById('view');
const renderer = new THREE.WebGLRenderer({antialias:true, alpha:false});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setClearColor(0x101216,1);
view.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x101216, 3000, 9000);

const camera = new THREE.PerspectiveCamera(50,1,5,40000);
const target = new THREE.Vector3(0,0,0);
let orbit = {az:Math.PI*0.25, el:Math.PI*0.28, dist:1400};

scene.add(new THREE.HemisphereLight(0xcfe0ff,0x202833,0.9));
const key = new THREE.DirectionalLight(0xffffff,0.85);
key.position.set(600,1200,400); scene.add(key);

// grid (drawn in Three space; Unreal XY plane = Three XZ plane)
const grid = new THREE.GridHelper(8000,80,0x39414f,0x222831);
grid.position.y = 0; scene.add(grid);
const axes = new THREE.Group();
function axisLine(dir,color){
  const g=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0),dir.clone().multiplyScalar(600)]);
  return new THREE.Line(g,new THREE.LineBasicMaterial({color}));
}
axes.add(axisLine(new THREE.Vector3(1,0,0),0xc0463f)); // Unreal +X
axes.add(axisLine(new THREE.Vector3(0,0,-1),0x4f9d4a)); // Unreal +Y -> Three -Z
axes.add(axisLine(new THREE.Vector3(0,1,0),0x3a6fb0)); // Unreal +Z -> Three +Y
scene.add(axes);

// Unreal(x,y,z) -> Three(x,y,z)
function U2T(x,y,z){ return new THREE.Vector3(x, z, -y); }

// ---- brush model ----
let nextId = 1;
const brushes = []; // {id,type,op,pos{x,y,z},size{x,y,z},yaw,sides,mesh,edges}
let selected = null;
const selectedSet = new Set(); // all currently selected brushes
function selCenter(){
  const s=[...selectedSet]; if(!s.length) return {x:0,y:0,z:0};
  return {x:s.reduce((a,b)=>a+b.pos.x,0)/s.length,
          y:s.reduce((a,b)=>a+b.pos.y,0)/s.length,
          z:s.reduce((a,b)=>a+b.pos.z,0)/s.length};
}
function _updateSelVisuals(){
  brushes.forEach(x=>{if(!x.edges)return;
    const isSel=selectedSet.has(x), isSub=x.op==='sub';
    x.edges.material.color.set(isSel?COL.sel:(isSub?COL.sub:COL.add));
    x.edges.material.opacity=isSel?1:0.7;
  });
  updateBrushFills();
}

function snap(v){ const s=SNAP.value; return s>0 ? Math.round(v/s)*s : v; }
function snapDeg(d){ const s=ROT_SNAP.value; return s>0 ? Math.round(d/s)*s : d; }

// ---- edited box geometry (face push / edge slide) ----
// A box may carry b.corners: 8 LOCAL points indexed by the same bit convention
// the CubeBuilder export uses — i: bit4=X, bit2=Y, bit1=Z (set bit = +half).
// Face push on a PRISTINE box stays parametric (size+pos change, exact builder
// survives). Edge slide is what creates corners; from then on the brush
// exports PolyList-only, same known limitation as ramp.
const GEO_FACES=[ // quads CCW-outward, derived from the box faces below
  {axis:'x',sign: 1,quad:[4,6,7,5]}, {axis:'x',sign:-1,quad:[2,0,1,3]},
  {axis:'y',sign: 1,quad:[6,2,3,7]}, {axis:'y',sign:-1,quad:[0,4,5,1]},
  {axis:'z',sign: 1,quad:[1,5,7,3]}, {axis:'z',sign:-1,quad:[2,6,4,0]},
];
const GEO_EDGES=[]; // pairs of corner indices differing in exactly one bit
for(let i=0;i<8;i++) for(const bit of [4,2,1]) if(!(i&bit))
  GEO_EDGES.push({i, j:i|bit, axis:bit===4?'x':bit===2?'y':'z'});
const AXI={x:0,y:1,z:2};
function cornersFromSize(b){
  const hx=b.size.x/2, hy=b.size.y/2, hz=b.size.z/2, C=[];
  for(let i=0;i<8;i++) C.push([(i&4)?hx:-hx,(i&2)?hy:-hy,(i&1)?hz:-hz]);
  return C;
}
// Moving one edge makes adjacent quads non-planar; UE requires planar polys,
// so those quads split into two triangles (winding preserved, normals still
// derived from winding — the facesFor invariant holds).
function quadPlanar(q){
  const n=normalOf(q);
  const d=n[0]*(q[3][0]-q[0][0])+n[1]*(q[3][1]-q[0][1])+n[2]*(q[3][2]-q[0][2]);
  return Math.abs(d)<0.01;
}
// Split a non-planar quad on whichever diagonal keeps the crease CONVEX
// (bulging outward). A fixed a-c diagonal can fold a legal shape concave —
// test the 4th point against the a-c tri's plane and flip to b-d if it's in
// front. Used by BOTH facesFor and validateCorners so display, CSG, export,
// and the validity gate all agree on the exact same geometry.
function splitQuad(q){
  if(quadPlanar(q)) return [q];
  const t1=[q[0],q[1],q[2]];
  const n=normalOf(t1);
  const w=n[0]*t1[0][0]+n[1]*t1[0][1]+n[2]*t1[0][2];
  const d=n[0]*q[3][0]+n[1]*q[3][1]+n[2]*q[3][2]-w;
  if(d>0) return [[q[1],q[2],q[3]],[q[1],q[3],q[0]]]; // b-d diagonal
  return [t1,[q[0],q[2],q[3]]];                        // a-c diagonal
}
// Convexity gate: every corner must sit on/behind every face plane. Runs on
// every geo drag; invalid moves are rejected (brush keeps its last valid
// shape) because both UE's BSP and our polygon-clip CSG require convexity.
function validateCorners(C){
  for(const ed of GEO_EDGES){
    const a=C[ed.i], b=C[ed.j];
    if(Math.hypot(a[0]-b[0],a[1]-b[1],a[2]-b[2])<1) return false; // degenerate edge
  }
  const tris=[];
  GEO_FACES.forEach(f=>{
    splitQuad(f.quad.map(i=>C[i])).forEach(face=>tris.push(face));
  });
  for(const t of tris){
    const n=normalOf(t);
    const w=n[0]*t[0][0]+n[1]*t[0][1]+n[2]*t[0][2];
    for(const p of C){ if(n[0]*p[0]+n[1]*p[1]+n[2]*p[2]-w>0.5) return false; }
  }
  return true;
}

// Face generators. Each face is a vertex loop wound CCW as seen from
// OUTSIDE (right-hand rule -> outward normal), matching UE4.27's BSP
// convention. Normals are DERIVED from winding so the two can't disagree.
function facesFor(b, opts){
  const {type,size}=b, hx=size.x/2, hy=size.y/2, hz=size.z/2;
  const F=[]; // each: [ [x,y,z], ... ] local, CCW outward
  if(type==='box'){
    if(b.corners){
      GEO_FACES.forEach(f=>{
        splitQuad(f.quad.map(i=>b.corners[i].slice())).forEach(face=>F.push(face));
      });
    } else {
    F.push([[hx,-hy,-hz],[hx,hy,-hz],[hx,hy,hz],[hx,-hy,hz]]);     // +X
    F.push([[-hx,hy,-hz],[-hx,-hy,-hz],[-hx,-hy,hz],[-hx,hy,hz]]); // -X
    F.push([[hx,hy,-hz],[-hx,hy,-hz],[-hx,hy,hz],[hx,hy,hz]]);     // +Y
    F.push([[-hx,-hy,-hz],[hx,-hy,-hz],[hx,-hy,hz],[-hx,-hy,hz]]); // -Y
    F.push([[-hx,-hy,hz],[hx,-hy,hz],[hx,hy,hz],[-hx,hy,hz]]);     // +Z
    F.push([[-hx,hy,-hz],[hx,hy,-hz],[hx,-hy,-hz],[-hx,-hy,-hz]]); // -Z
    }
  } else if(type==='cyl'){
    const n=b.sides||16, top=[],bot=[];
    for(let i=0;i<n;i++){const a=i/n*Math.PI*2;
      top.push([Math.cos(a)*hx,Math.sin(a)*hy,hz]); bot.push([Math.cos(a)*hx,Math.sin(a)*hy,-hz]);}
    F.push(top.slice());                 // +Z cap
    F.push(bot.slice().reverse());       // -Z cap
    for(let i=0;i<n;i++){const j=(i+1)%n; F.push([bot[i],bot[j],top[j],top[i]]);}
  } else if(type==='cone'){
    const n=b.sides||16, bot=[], apex=[0,0,hz];
    for(let i=0;i<n;i++){const a=i/n*Math.PI*2; bot.push([Math.cos(a)*hx,Math.sin(a)*hy,-hz]);}
    F.push(bot.slice().reverse());       // -Z base
    for(let i=0;i<n;i++){const j=(i+1)%n; F.push([bot[i],bot[j],apex]);}
  } else if(type==='ramp'){
    const A=[-hx,-hy,-hz],B=[hx,-hy,-hz],C=[hx,hy,-hz],D=[-hx,hy,-hz],E=[-hx,-hy,hz],G=[-hx,hy,hz];
    F.push([A,D,C,B]);   // bottom  -Z
    F.push([A,E,G,D]);   // back    -X
    F.push([E,B,C,G]);   // slope   (+X,+Z)
    F.push([A,B,E]);     // side    -Y
    F.push([D,G,C]);     // side    +Y
  }
  // Rotate then translate -> world Unreal coords.
  // EXPORT path keeps geometry local (centered at origin); position/rotation
  // are applied by the brush component so they survive a UE builder rebuild.
  if(opts && opts.local) return F.map(face=>face.map(p=>[p[0],p[1],p[2]]));
  // Display: apply full FRotator rotation (yaw→pitch→roll, UE's order) about
  // the centre, then translate to world position.
  const bz=b.pos.z;
  const tx=p=>{ const r=rotUnreal(p, b.yaw||0, b.pitch||0, b.roll||0);
                return [r[0]+b.pos.x, r[1]+b.pos.y, r[2]+bz]; };
  return F.map(face=>face.map(tx));
}
// UE FRotator applied to a vector: rotate about Z (yaw), then Y (pitch), then
// X (roll) — i.e. v' = Rx(roll)·Ry(pitch)·Rz(yaw)·v. Handedness matches UE4's
// RotateVector (yaw left-hand about +Z, pitch/roll right-hand). All angles in
// RADIANS here. This is the SINGLE source of truth shared by display and the
// export's RelativeRotation, so the preview can't drift from the paste.
function rotUnreal(p, yaw, pitch, roll){
  let x=p[0], y=p[1], z=p[2];
  // yaw about +Z (matches the previous yaw-only block exactly when pitch=roll=0)
  let cz=Math.cos(yaw), sz=Math.sin(yaw);
  let x1=x*cz - y*sz, y1=x*sz + y*cz, z1=z;
  // pitch about +Y (UE: positive pitch tilts +X up toward +Z)
  let cy=Math.cos(pitch), sy=Math.sin(pitch);
  let x2=x1*cy - z1*sy, y2=y1, z2=x1*sy + z1*cy;
  // roll about +X (right-hand)
  let cx=Math.cos(roll), sx=Math.sin(roll);
  let x3=x2, y3=y2*cx - z2*sx, z3=y2*sx + z2*cx;
  return [x3, y3, z3];
}
// outward unit normal from the first three (planar) vertices
function normalOf(face){
  const a=face[0],b=face[1],c=face[2];
  const u=[b[0]-a[0],b[1]-a[1],b[2]-a[2]], v=[c[0]-a[0],c[1]-a[1],c[2]-a[2]];
  const n=[u[1]*v[2]-u[2]*v[1], u[2]*v[0]-u[0]*v[2], u[0]*v[1]-u[1]*v[0]];
  const L=Math.hypot(n[0],n[1],n[2])||1; return [n[0]/L,n[1]/L,n[2]/L];
}

// build / rebuild Three mesh straight from the export polygons (display == export)
function buildMesh(b){
  if(b.mesh){scene.remove(b.mesh);} if(b.edges){scene.remove(b.edges);}
  const faces=facesFor(b);
  const pos=[],nor=[];
  faces.forEach(face=>{
    const verts=face.map(p=>U2T(p[0],p[1],p[2]));
    const n=normalOf(face); const nm=U2T(n[0],n[1],n[2]).normalize();
    for(let i=1;i<verts.length-1;i++){
      [verts[0],verts[i],verts[i+1]].forEach(vtx=>{pos.push(vtx.x,vtx.y,vtx.z);nor.push(nm.x,nm.y,nm.z);});
    }
  });
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute('normal',new THREE.Float32BufferAttribute(nor,3));
  const isSub=b.op==='sub';
  const mat=new THREE.MeshStandardMaterial({
    color:isSub?COL.sub:COL.add, roughness:.65, metalness:.05,
    transparent:true, opacity:isSub?0.18:0.55, side:THREE.DoubleSide,
    depthWrite:!isSub
  });
  b.mesh=new THREE.Mesh(g,mat); b.mesh.userData.id=b.id; scene.add(b.mesh);
  const eg=new THREE.EdgesGeometry(g,1);
  b.edges=new THREE.LineSegments(eg,new THREE.LineBasicMaterial({
    color:selectedSet.has(b)?COL.sel:(isSub?COL.sub:COL.add), linewidth:1,
    transparent:true, opacity:selectedSet.has(b)?1:0.7
  }));
  scene.add(b.edges);
  const vis=b.visible!==false;
  b.mesh.visible=vis; b.edges.visible=vis;
}

const TYPE_NAMES={box:'Box',cyl:'Cylinder',cone:'Cone',ramp:'Ramp'};
function defaultName(type,id){ return `${TYPE_NAMES[type]||type} ${id}`; }

function addBrush(type){
  const b={id:nextId++, type, op:currentOp,
    pos:{x:0,y:0,z:100},
    size:{x:200,y:200,z:200}, yaw:0, pitch:0, roll:0, sides:16, visible:true};
  b.name=defaultName(type,b.id);
  brushes.push(b); buildMesh(b); select(b); pushHistory(); refreshHUD();
}

function duplicateBrush(src){
  const sources=selectedSet.size>1?[...selectedSet]:(src?[src]:[]);
  if(!sources.length) return;
  selectedSet.clear();
  sources.forEach(s=>{
    const n=JSON.parse(JSON.stringify({...s,mesh:null,edges:null}));
    n.id=nextId++; n.pos.x+=SNAP.value*2; n.pos.y+=SNAP.value*2;
    n.name=(s.name||defaultName(s.type,s.id))+' (copy)';
    brushes.push(n); buildMesh(n); selectedSet.add(n); selected=n;
  });
  _updateSelVisuals(); buildInspector();
  document.getElementById('selbar').classList.toggle('show',true);
  pushHistory(); refreshHUD(); refreshOutliner();
  toast(sources.length>1?`${sources.length} brushes duplicated`:'Brush duplicated');
}

function deleteBrush(b){
  const targets=b?[b]:[...selectedSet];
  if(!targets.length) return;
  pushHistory();
  targets.forEach(x=>{
    scene.remove(x.mesh); scene.remove(x.edges);
    const idx=brushes.indexOf(x); if(idx>=0) brushes.splice(idx,1);
    selectedSet.delete(x);
  });
  if(targets.includes(selected)) selected=null;
  select(null); refreshHUD();
}

// ---- selection ----
function select(b){
  selectedSet.clear();
  selected=b;
  if(b) selectedSet.add(b);
  _updateSelVisuals();
  buildInspector();
  document.getElementById('selbar').classList.toggle('show',selectedSet.size>0);
  refreshOutliner();
}
function selectToggle(b){
  if(!b) return;
  if(selectedSet.has(b)){ selectedSet.delete(b); selected=[...selectedSet].pop()||null; }
  else { selectedSet.add(b); selected=b; }
  _updateSelVisuals(); buildInspector();
  document.getElementById('selbar').classList.toggle('show',selectedSet.size>0);
  refreshOutliner();
}
function selectAll(){
  brushes.forEach(b=>selectedSet.add(b));
  selected=brushes[brushes.length-1]||null;
  _updateSelVisuals(); buildInspector();
  document.getElementById('selbar').classList.toggle('show',selectedSet.size>0);
  refreshOutliner();
}

// ---- inspector UI ----
const ibody=document.getElementById('ibody');
const ititle=document.getElementById('ititle');
const iswatch=document.getElementById('iswatch');
const NAMES={box:'Box',cyl:'Cylinder',cone:'Cone',ramp:'Ramp'};

function buildInspector(){
  ibody.innerHTML='';
  if(!selected){
    ititle.textContent='No selection';
    iswatch.style.background='var(--faint)';
    ibody.innerHTML='<div class="empty">Tap a primitive (left) to place a brush.<br>Tap a brush to select. One-finger orbit · two-finger pan/zoom.<br>Shift+click or Ctrl+A to multi-select.</div>';
    return;
  }
  // Multi-select: show summary + shared controls
  if(selectedSet.size>1){
    const n=selectedSet.size;
    const ops=[...selectedSet].map(b=>b.op);
    const allAdd=ops.every(o=>o==='add'), allSub=ops.every(o=>o==='sub');
    ititle.innerHTML=`<small>${n} brushes selected</small>`;
    iswatch.style.background=allAdd?'var(--add)':allSub?'var(--sub)':'var(--faint)';
    const sec=document.createElement('div'); sec.className='field full sec';
    sec.innerHTML='<label>CSG operation — applies to all</label>';
    ibody.append(sec);
    const seg=document.createElement('div'); seg.className='seg'+(allSub?' sub':'');
    const ba=document.createElement('button'); ba.textContent='ADD';    ba.className=allSub?'':'on';
    const bs=document.createElement('button'); bs.textContent='SUBTRACT'; bs.className=allSub?'on':'';
    ba.onclick=()=>{[...selectedSet].forEach(b=>{b.op='add';buildMesh(b);}); pushHistory(); buildInspector();};
    bs.onclick=()=>{[...selectedSet].forEach(b=>{b.op='sub';buildMesh(b);}); pushHistory(); buildInspector();};
    seg.append(ba,bs);

    const hint=document.createElement('div'); hint.className='empty';
    hint.textContent='Use the gizmo to move, scale, or rotate all selected brushes.';
    ibody.append(hint);
    return;
  }
  const b=selected, isSub=b.op==='sub';
  ititle.innerHTML=`${NAMES[b.type]} <small>#${b.id}</small>`;
  iswatch.style.background=isSub?'var(--sub)':'var(--add)';

  const field=(label,key,axis,obj)=>{
    const wrap=document.createElement('div'); wrap.className='field';
    wrap.innerHTML=`<label>${label}</label>`;
    const row=document.createElement('div'); row.className='row';
    const dec=document.createElement('button'); dec.className='step'; dec.textContent='–';
    const inp=document.createElement('input'); inp.className='num'; inp.type='number'; inp.inputMode='numeric';
    inp.value=Math.round(obj[axis]);
    const inc=document.createElement('button'); inc.className='step'; inc.textContent='+';
    const apply=v=>{obj[axis]=axis==='z'&&key==='size'?Math.max(1,v):(key==='size'?Math.max(1,v):v);pushHistory();buildMesh(b);buildInspector();refreshHUD();};
    dec.onclick=()=>apply(snap(obj[axis]-SNAP.value)); inc.onclick=()=>apply(snap(obj[axis]+SNAP.value));
    inp.onchange=()=>apply(parseFloat(inp.value)||0);
    row.append(dec,inp,inc); wrap.append(row); return wrap;
  };

  // Dimension labels: cylinder/cone size.x/y are radii, size.z is height.
  const round = (b.type==='cyl'||b.type==='cone');
  const dl = round ? {x:'Radius X', y:'Radius Y', z:'Height'}
                   : {x:'Size X',   y:'Size Y',   z:'Size Z'};
  const sec=(t)=>{const h=document.createElement('div');h.className='field full sec';h.innerHTML=`<label>${t}</label>`;return h;};

  // rotation fields (degrees) — one builder for yaw/pitch/roll
  const rotField=(label,key)=>{
    const wrap=document.createElement('div'); wrap.className='field';
    wrap.innerHTML=`<label>${label} °</label>`;
    const r=document.createElement('div'); r.className='row';
    const d=document.createElement('button');d.className='step';d.textContent='–';
    const inp=document.createElement('input');inp.className='num';inp.type='number';
    inp.value=Math.round((b[key]||0)*180/Math.PI);
    const u=document.createElement('button');u.className='step';u.textContent='+';
    const set=deg=>{b[key]=deg*Math.PI/180;pushHistory();buildMesh(b);buildInspector();};
    const cur=()=>(b[key]||0)*180/Math.PI;
    d.onclick=()=>set(snapDeg(cur()-ROT_SNAP.value)); u.onclick=()=>set(snapDeg(cur()+ROT_SNAP.value));
    inp.onchange=()=>set(parseFloat(inp.value)||0);
    r.append(d,inp,u); wrap.append(r); return wrap;
  };

  // POSITION group — these MOVE the brush
  ibody.append(sec('Position (centre) — matches UE coordinates'));
  ibody.append(field('Pos X','pos','x',b.pos), field('Pos Y','pos','y',b.pos));
  ibody.append(field('Pos Z','pos','z',b.pos));

  // ROTATION group — full FRotator (yaw→pitch→roll, UE order)
  ibody.append(sec('Rotation — UE FRotator (Yaw→Pitch→Roll)'));
  ibody.append(rotField('Yaw','yaw'), rotField('Pitch','pitch'));
  ibody.append(rotField('Roll','roll'));

  // SIZE group — these RESIZE the brush
  if(b.type==='box'&&b.corners){
    // Size fields would fight the corners — replace with a note + reset.
    ibody.append(sec('Geometry — edited (faces/edges moved)'));
    const note=document.createElement('div'); note.className='field full';
    note.innerHTML='<label style="text-transform:none;letter-spacing:0">Exports as raw polygons (no exact builder — same as ramp). Use GEO mode handles to keep editing, or reset:</label>';
    ibody.append(note);
    const rw=document.createElement('div'); rw.className='field full';
    const rbtn=document.createElement('button'); rbtn.className='btn danger';
    rbtn.textContent='Reset to parametric box';
    rbtn.onclick=()=>{
      const C=b.corners;
      const ext=a=>{let mn=Infinity,mx=-Infinity;C.forEach(p=>{mn=Math.min(mn,p[a]);mx=Math.max(mx,p[a]);});return mx-mn;};
      b.size={x:Math.max(10,Math.round(ext(0))),y:Math.max(10,Math.round(ext(1))),z:Math.max(10,Math.round(ext(2)))};
      delete b.corners;
      pushHistory(); buildMesh(b); select(b); refreshHUD();
      toast('Reset to box (size = bounding extents)');
    };
    rw.append(rbtn); ibody.append(rw);
  } else {
  ibody.append(sec('Size — resizes the brush'));
  ibody.append(field(dl.x,'size','x',b.size), field(dl.y,'size','y',b.size));
  if(round){
    const sd=document.createElement('div'); sd.className='field';
    sd.innerHTML='<label>Sides</label>';
    const sr=document.createElement('div'); sr.className='row';
    const a=document.createElement('button');a.className='step';a.textContent='–';
    const inp=document.createElement('input');inp.className='num';inp.type='number';inp.value=b.sides;
    const c=document.createElement('button');c.className='step';c.textContent='+';
    const setS=v=>{b.sides=Math.max(3,Math.min(64,v));pushHistory();buildMesh(b);buildInspector();};
    a.onclick=()=>setS(b.sides-1);c.onclick=()=>setS(b.sides+1);inp.onchange=()=>setS(parseInt(inp.value)||16);
    sr.append(a,inp,c); sd.append(sr);
    ibody.append(field(dl.z,'size','z',b.size), sd);
  } else {
    ibody.append(field(dl.z,'size','z',b.size));
  }
  } // end size-vs-edited branch

  // op toggle + actions row
  const opF=document.createElement('div'); opF.className='field full';
  opF.innerHTML='<label>CSG operation</label>';
  const seg=document.createElement('div'); seg.className='seg'+(isSub?' sub':'');
  const ba=document.createElement('button');ba.textContent='ADD';ba.className=isSub?'':'on';
  const bs=document.createElement('button');bs.textContent='SUBTRACT';bs.className=isSub?'on':'';
  ba.onclick=()=>{b.op='add';pushHistory();buildMesh(b);select(b);}; bs.onclick=()=>{b.op='sub';pushHistory();buildMesh(b);select(b);};
  seg.append(ba,bs); opF.append(seg); ibody.append(opF);
}

// ---- T3D export ----
function uf(n){ if(!isFinite(n))n=0; const sign=n<0?'-':'+'; const v=Math.abs(n).toFixed(6);
  const [i,d]=v.split('.'); return sign+i.padStart(5,'0')+'.'+d; }
function v3(p){ return `${uf(p[0])},${uf(p[1])},${uf(p[2])}`; }
function tangents(n){
  const up=Math.abs(n[2])<0.99?[0,0,1]:[1,0,0];
  let u=[n[1]*up[2]-n[2]*up[1], n[2]*up[0]-n[0]*up[2], n[0]*up[1]-n[1]*up[0]];
  let l=Math.hypot(...u)||1; u=u.map(x=>x/l);
  let v=[n[1]*u[2]-n[2]*u[1], n[2]*u[0]-n[0]*u[2], n[0]*u[1]-n[1]*u[0]];
  l=Math.hypot(...v)||1; v=v.map(x=>x/l);
  return {u,v};
}
function ff(n){ return (isFinite(n)?n:0).toFixed(6); }
function brushT3D(b,idx){
  const faces=facesFor(b,{local:true});           // geometry centered at origin
  let pl='';
  faces.forEach(face=>{
    const n=normalOf(face); const {u,v}=tangents(n);
    pl+='               Begin Polygon\n';
    pl+=`                  Origin   ${v3(face[0])}\n`;
    pl+=`                  Normal   ${v3(n)}\n`;
    pl+=`                  TextureU ${v3(u)}\n`;
    pl+=`                  TextureV ${v3(v)}\n`;
    face.forEach(p=>{ pl+=`                  Vertex   ${v3(p)}\n`; });
    pl+='               End Polygon\n';
  });
  const name=`${b.op==='add'?'Add':'Sub'}Brush_${idx}`;
  const model=`Model_${idx}`, polys=`Polys_${idx}`;
  const bt=b.op==='add'?'Brush_Add':'Brush_Subtract';
  const loc=`RelativeLocation=(X=${ff(b.pos.x)},Y=${ff(b.pos.y)},Z=${ff(b.pos.z)})`;
  const rot=`RelativeRotation=(Pitch=${ff((b.pitch||0)*180/Math.PI)},Yaw=${ff((b.yaw||0)*180/Math.PI)},Roll=${ff((b.roll||0)*180/Math.PI)})`;

  // Brush builder. UE rebuilds a pasted brush from its builder, so the builder
  // must carry the real dimensions or the PolyList gets overwritten by a
  // default 200^3 cube. Box has an exact builder; others fall back to PolyList.
  let bDecl='', bBody='', bRef='';
  // Edited (corners) boxes get NO builder — an exact CubeBuilder would lie
  // about the shape and UE would rebuild it as a plain cube. PolyList-only
  // fallback, same known limitation as ramp.
  if(b.type==='box'&&!b.corners){
    const hx=b.size.x/2,hy=b.size.y/2,hz=b.size.z/2, V=[];
    for(let i=0;i<8;i++){const x=(i&4)?hx:-hx,y=(i&2)?hy:-hy,z=(i&1)?hz:-hz;
      V.push(`            Vertices(${i})=(X=${ff(x)},Y=${ff(y)},Z=${ff(z)})`);}
    const topo=["(0,1,3,2)","(2,3,7,6)","(6,7,5,4)","(4,5,1,0)","(3,1,5,7)","(0,2,6,4)"]
      .map((p,i)=>`            Polys(${i})=(VertexIndices=${p},Direction=1)`);
    // UE omits builder dims equal to the 200 default; emit only what changed.
    let dims='';
    if(b.size.x!==200) dims+=`            X=${ff(b.size.x)}\n`;
    if(b.size.y!==200) dims+=`            Y=${ff(b.size.y)}\n`;
    if(b.size.z!==200) dims+=`            Z=${ff(b.size.z)}\n`;
    bDecl=`         Begin Object Class=/Script/UnrealEd.CubeBuilder Name="CubeBuilder_${idx}"\n         End Object\n`;
    bBody=`         Begin Object Name="CubeBuilder_${idx}"\n`
      +dims
      +V.join('\n')+'\n'+topo.join('\n')+'\n'
      +`            Layer="Cube"\n         End Object\n`;
    bRef=`         BrushBuilder=CubeBuilder'"CubeBuilder_${idx}"'\n`;
  }

  return (
`      Begin Actor Class=/Script/Engine.Brush Name=${name} Archetype=/Script/Engine.Brush'/Script/Engine.Default__Brush'
         Begin Object Class=/Script/Engine.BrushComponent Name="BrushComponent0" Archetype=BrushComponent'/Script/Engine.Default__Brush:BrushComponent0'
         End Object
         Begin Brush Name=${model}
         End Brush
         Begin Object Class=/Script/Engine.Polys Name="${polys}"
         End Object
${bDecl}         Begin Object Name="BrushComponent0"
            Brush=Model'"${model}"'
            ${loc}
            ${rot}
         End Object
         Begin Object Name="${polys}"
         End Object
${bBody}         BrushType=${bt}
         bNotForClientOrServer=True
         Begin Brush Name=${model}
            Begin PolyList
${pl}            End PolyList
         End Brush
         Brush=Model'"${model}"'
         BrushComponent="BrushComponent0"
${bRef}         bHidden=False
         SpawnCollisionHandlingMethod=AlwaysSpawn
         RootComponent="BrushComponent0"
         ActorLabel="${name}"
      End Actor`);
}
function buildT3D(list){
  const src=list||brushes;
  const body=src.map((b,i)=>brushT3D(b,i)).join('\n');
  const t=`Begin Map\n   Begin Level\n${body}\n   End Level\nBegin Surface\nEnd Surface\nEnd Map\n`;
  // UE4.27 on Windows writes \r\n line endings and its T3D parser expects them.
  // Pasting a Unix \n-only string into the viewport does nothing — silently ignored.
  return t.replace(/\r?\n/g,'\r\n');
}

// data: URI download — reliable on iOS (Blob URL produces empty files on iOS Safari)
function downloadFile(txt,name){
  try{
    const a=document.createElement('a');
    a.href='data:text/plain;charset=utf-8,'+encodeURIComponent(txt);
    a.download=name; document.body.appendChild(a); a.click(); a.remove(); return true;
  }catch(e){ return false; }
}
async function copyText(txt){
  try{ if(navigator.clipboard&&window.isSecureContext){ await navigator.clipboard.writeText(txt); return true; } }catch(e){}
  try{
    const el=document.createElement('textarea'); el.value=txt;
    el.style.cssText='position:fixed;left:-9999px;top:0';
    document.body.appendChild(el); el.focus(); el.setSelectionRange(0,txt.length);
    const ok=document.execCommand('copy'); document.body.removeChild(el); return ok;
  }catch(e){ return false; }
}
async function shareFile(txt,name){
  const file=(()=>{try{return new File([txt],name,{type:'text/plain'});}catch(e){return null;}})();
  try{
    if(navigator.canShare&&file&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:'BrushForge T3D'}); return 'file';
    }
    if(navigator.share){ await navigator.share({title:'BrushForge Export',text:txt}); return 'text'; }
  }catch(e){ if(e&&e.name==='AbortError') return 'cancel'; }
  return false;
}

function updateCamera(){
  const {az,el,dist}=orbit;
  camera.position.set(
    target.x+dist*Math.cos(el)*Math.sin(az),
    target.y+dist*Math.sin(el),
    target.z+dist*Math.cos(el)*Math.cos(az));
  camera.lookAt(target);
}
function resize(){
  const w=view.clientWidth,h=view.clientHeight;
  if(w<2||h<2) return; // container not laid out yet (e.g. inside an embedded preview frame)
  renderer.setSize(w,h,false); camera.aspect=w/h; camera.updateProjectionMatrix();
}
window.addEventListener('resize',resize);
// Embedded previews (Claude's artifact pane, etc.) can change the canvas's
// actual container size without ever firing a window 'resize' event, which
// leaves the renderer at a stale aspect ratio and skews the perspective.
// ResizeObserver catches that directly on the element itself.
if(window.ResizeObserver){ new ResizeObserver(()=>resize()).observe(view); }
// Also re-check shortly after boot in case layout settles a frame late.
requestAnimationFrame(resize); setTimeout(resize,300);

let ptr={mode:null,x:0,y:0,downX:0,downY:0,d:0,moved:0,downT:0};
const el=renderer.domElement;
function tdist(t){const dx=t[0].clientX-t[1].clientX,dy=t[0].clientY-t[1].clientY;return Math.hypot(dx,dy);}
function tmid(t){return{x:(t[0].clientX+t[1].clientX)/2,y:(t[0].clientY+t[1].clientY)/2};}

// ---- marquee (box) select ----
// Single-finger/left-mouse drag always meant "orbit" — there was no free
// gesture left for box-select. Reusing the long-press timing that already
// exists for toggle-select: a QUICK drag still orbits (unchanged feel), a
// HELD-then-drag becomes marquee. Decision fires once real movement crosses
// the same thresholds already used for tap-vs-drag detection below, so a
// long-press-without-moving still falls through to the existing toggle-pick.
const LONG_PRESS_MS=300;
const marqueeEl=document.getElementById('marquee');
function updateMarqueeRect(x0,y0,x1,y1){
  marqueeEl.style.left=Math.min(x0,x1)+'px'; marqueeEl.style.top=Math.min(y0,y1)+'px';
  marqueeEl.style.width=Math.abs(x1-x0)+'px'; marqueeEl.style.height=Math.abs(y1-y0)+'px';
  marqueeEl.style.display='block';
}
function hideMarquee(){ marqueeEl.style.display='none'; }
// Screen-space AABB of a brush's world-space vertices (reuses facesFor()+U2T()
// so it stays correct under yaw, exactly like the gizmo's own screenPos calls).
function screenAABBOfBrush(b){
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  facesFor(b).forEach(face=>face.forEach(p=>{
    const s=screenPos(U2T(p[0],p[1],p[2]));
    if(s.x<minX)minX=s.x; if(s.x>maxX)maxX=s.x;
    if(s.y<minY)minY=s.y; if(s.y>maxY)maxY=s.y;
  }));
  return {minX,minY,maxX,maxY};
}
function rectsOverlap(a,b){ return a.minX<=b.maxX && a.maxX>=b.minX && a.minY<=b.maxY && a.maxY>=b.minY; }
// Selection is REPLACE-only for v1 (matches selectAll()'s pattern below);
// additive/subtractive marquee is a natural follow-up, not built here.
function finalizeMarquee(x0,y0,x1,y1){
  const rect={minX:Math.min(x0,x1),maxX:Math.max(x0,x1),minY:Math.min(y0,y1),maxY:Math.max(y0,y1)};
  const hits=brushes.filter(b=>b.visible!==false && rectsOverlap(rect,screenAABBOfBrush(b)));
  selectedSet.clear();
  hits.forEach(b=>selectedSet.add(b));
  selected=hits[hits.length-1]||null;
  _updateSelVisuals(); buildInspector();
  document.getElementById('selbar').classList.toggle('show',selectedSet.size>0);
  refreshOutliner();
}

el.addEventListener('touchstart',e=>{
  if(e.touches.length===1){
    const tx=e.touches[0].clientX, ty=e.touches[0].clientY;
    const hit=gizmoHitAxis(tx,ty);
    if(hit){ ptr.mode='gizmo'; gizmoStart(hit,tx,ty); }
    else { ptr.mode='pending'; }
    ptr.x=tx;ptr.y=ty;ptr.downX=tx;ptr.downY=ty;ptr.moved=0;ptr.downT=Date.now();
  }
  else if(e.touches.length===2){ptr.mode='pan';ptr.d=tdist(e.touches);const m=tmid(e.touches);ptr.x=m.x;ptr.y=m.y;ptr.moved=0;ptr.downT=Date.now();ptr.d0=ptr.d;}
},{passive:false});
el.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(ptr.mode==='gizmo'&&e.touches.length===1){
    ptr.moved+=10; gizmoMoveTo(e.touches[0].clientX,e.touches[0].clientY);
  } else if(ptr.mode==='pending'&&e.touches.length===1){
    const tx=e.touches[0].clientX, ty=e.touches[0].clientY;
    ptr.moved+=Math.abs(tx-ptr.x)+Math.abs(ty-ptr.y); ptr.x=tx;ptr.y=ty;
    if(ptr.moved>=8){

    }
  } else if(ptr.mode==='orbit'&&e.touches.length===1){
    const dx=e.touches[0].clientX-ptr.x, dy=e.touches[0].clientY-ptr.y;
    ptr.moved+=Math.abs(dx)+Math.abs(dy);
    orbit.az-=dx*0.006; orbit.el=Math.max(0.05,Math.min(1.5,orbit.el+dy*0.006));
    ptr.x=e.touches[0].clientX;ptr.y=e.touches[0].clientY; updateCamera();
  } else if(ptr.mode==='marquee'&&e.touches.length===1){
    ptr.x=e.touches[0].clientX; ptr.y=e.touches[0].clientY;
    updateMarqueeRect(ptr.downX,ptr.downY,ptr.x,ptr.y);
  } else if(ptr.mode==='pan'&&e.touches.length===2){
    const nd=tdist(e.touches); orbit.dist=Math.max(150,Math.min(12000,orbit.dist*(ptr.d/nd))); ptr.d=nd;
    const m=tmid(e.touches), dx=m.x-ptr.x, dy=m.y-ptr.y; ptr.x=m.x;ptr.y=m.y;
    ptr.moved+=Math.abs(dx)+Math.abs(dy)+Math.abs(nd-(ptr.d0||nd)); ptr.d0=nd;

},{passive:false});
el.addEventListener('touchend',e=>{
  if(ptr.mode==='gizmo'){ const dragged=!!gizmoDrag; gizmoDrag=null; if(dragged) pushHistory(); }
  else if(ptr.mode==='marquee'){ finalizeMarquee(ptr.downX,ptr.downY,ptr.x,ptr.y); hideMarquee(); }
  else if(ptr.mode==='pending'&&ptr.moved<8&&Date.now()-ptr.downT<300){ pick(ptr.x,ptr.y); }
  else if(ptr.mode==='pending'&&ptr.moved<8&&Date.now()-ptr.downT>=300){ pick(ptr.x,ptr.y,true); } // long-press = toggle
  // Two-finger tap = undo. Tiny movement + short duration separate it from a
  // pan/pinch. Fingers may lift one-at-a-time (2->1->0) or together (2->0);
  // the _twoTapDone flag makes it fire exactly once either way.
  else if(ptr.mode==='pan'&&ptr.moved<12&&Date.now()-ptr.downT<300&&!ptr._twoTapDone){
    ptr._twoTapDone=true; undo();

  ptr.mode=e.touches.length?ptr.mode:null;

function panCamera(dx,dy){
  const right=new THREE.Vector3(),up=new THREE.Vector3();
  camera.getWorldDirection(right); right.cross(camera.up).normalize();
  up.copy(camera.up);
  const k=orbit.dist*0.0016;
  target.addScaledVector(right,-dx*k); target.addScaledVector(up,dy*k);
}

// raycast pick
const ray=new THREE.Raycaster();
function pick(px,py,shift=false){
  const r=el.getBoundingClientRect();
  const m=new THREE.Vector2(((px-r.left)/r.width)*2-1,-((py-r.top)/r.height)*2+1);
  ray.setFromCamera(m,camera);
  const hits=ray.intersectObjects(brushes.map(b=>b.mesh),false);
  if(hits.length){
    const b=brushes.find(b=>b.id===hits[0].object.userData.id);
    if(shift) selectToggle(b); else select(b);
  } else if(!shift) select(null);
}

// Local Z extents — differs from ±size.z/2 once a box has edited corners.
function localZMin(b){
  if(b.corners) return Math.min(...b.corners.map(c=>c[2]));
  return -b.size.z/2;
}

// Drop the brush straight down onto whatever's beneath it — another brush's
// top surface if there is one, otherwise the world floor (Z=0). pos.z is the
// brush's BASE anchor, so the hit point becomes the new pos.z directly.
function snapToGround(b, skipHistory=false){
  if(!b) return;
  const originThree=U2T(b.pos.x, b.pos.y, b.pos.z+100000);
  ray.set(originThree, new THREE.Vector3(0,-1,0));
  ray.far=300000;
  const others=brushes.filter(x=>x!==b).map(x=>x.mesh);
  const hits=ray.intersectObjects(others,false);
  ray.far=Infinity;
  const surfaceZ=hits.length?hits[0].point.y:0;
  b.pos.z=snap(surfaceZ-localZMin(b));
  if(!skipHistory){ pushHistory(); buildMesh(b); buildInspector(); refreshHUD();
    toast(hits.length?'Snapped onto brush below':'Snapped to ground (Z=0)');
  } else { buildMesh(b); }
}

// ---- gizmo (move / rotate / scale) ----
let gizmoMode='move'; // 'move' | 'rotate' | 'scale'
let gizmoSpace='world'; // 'world' | 'local' — only Move respects this; Scale is always local
const gizmoRoot=new THREE.Group(); gizmoRoot.visible=false; scene.add(gizmoRoot);
const GZ=260; // overall gizmo reach in scene units before the distance-based scale factor
// dir is in THREE space: Unreal +X->(1,0,0), +Y->(0,0,-1), +Z->(0,1,0)
const axisDefs=[
  {comp:'x', dir:new THREE.Vector3(1,0,0),  color:0xE8554E, scaleFactor:2}, // X/Y grow symmetric -> *2
  {comp:'y', dir:new THREE.Vector3(0,0,-1), color:0x5BD15B, scaleFactor:2},
  {comp:'z', dir:new THREE.Vector3(0,1,0),  color:0x4F9DFF, scaleFactor:1}, // Z grows from base only
];

// -- move group: arrows --
const moveGroup=new THREE.Group(); gizmoRoot.add(moveGroup);
const movePickers=[];
axisDefs.forEach(ax=>{
  const arrow=new THREE.ArrowHelper(ax.dir, new THREE.Vector3(0,0,0), GZ, ax.color, GZ*0.26, GZ*0.15);
  moveGroup.add(arrow);
  const picker=new THREE.Mesh(new THREE.CylinderGeometry(GZ*0.15,GZ*0.15,GZ,8),
                               new THREE.MeshBasicMaterial({visible:false}));
  picker.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), ax.dir);
  picker.position.copy(ax.dir.clone().multiplyScalar(GZ*0.5));
  picker.userData.axis=ax; moveGroup.add(picker); movePickers.push(picker);
});

// -- scale group: axis line + cube handle --
const scaleGroup=new THREE.Group(); scaleGroup.visible=false; gizmoRoot.add(scaleGroup);
const scalePickers=[];
axisDefs.forEach(ax=>{
  const len=GZ*0.8;
  const line=new THREE.Mesh(new THREE.CylinderGeometry(GZ*0.025,GZ*0.025,len,8),
                             new THREE.MeshBasicMaterial({color:ax.color}));
  line.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), ax.dir);
  line.position.copy(ax.dir.clone().multiplyScalar(len/2));
  scaleGroup.add(line);
  const cube=new THREE.Mesh(new THREE.BoxGeometry(GZ*0.17,GZ*0.17,GZ*0.17),
                             new THREE.MeshBasicMaterial({color:ax.color}));
  cube.position.copy(ax.dir.clone().multiplyScalar(len));
  scaleGroup.add(cube);
  const picker=new THREE.Mesh(new THREE.CylinderGeometry(GZ*0.17,GZ*0.17,len+GZ*0.22,8),
                               new THREE.MeshBasicMaterial({visible:false}));
  picker.quaternion.copy(line.quaternion);
  picker.position.copy(ax.dir.clone().multiplyScalar((len+GZ*0.22)/2));
  picker.userData.axis=ax; scaleGroup.add(picker); scalePickers.push(picker);
});
// center handle: scales all three axes together, proportionally
const uniformHandle=new THREE.Mesh(new THREE.SphereGeometry(GZ*0.105,16,12),
                                    new THREE.MeshBasicMaterial({color:0xF2F4F8}));
scaleGroup.add(uniformHandle);
const uniformPicker=new THREE.Mesh(new THREE.SphereGeometry(GZ*0.22,12,10),
                                    new THREE.MeshBasicMaterial({visible:false}));
uniformPicker.userData.uniform=true; scaleGroup.add(uniformPicker);

// -- rotate group: three rings, one per FRotator axis --
// Rings sit on the WORLD axes (screen-fixed), matching how UE's rotate widget
// shows world-space rotation handles. yaw=Z ring, pitch=Y ring, roll=X ring.
// Colours match the move/scale axis palette: X red, Y green, Z blue.
const rotateGroup=new THREE.Group(); rotateGroup.visible=false; gizmoRoot.add(rotateGroup);
const ringR=GZ*0.95, ringTube=GZ*0.032;
const rotatePickers=[];
// axis: which FRotator angle; threeAxis: rotation to lay the torus in that plane
[
  {key:'yaw',   color:0x4F9DFF, rot:[Math.PI/2,0,0]}, // about Unreal+Z (Three+Y): ring in Three XZ
  {key:'pitch', color:0x5BD15B, rot:[0,0,0]},          // about Unreal+Y (Three-Z): ring in Three XY
  {key:'roll',  color:0xE8554E, rot:[0,Math.PI/2,0]}, // about Unreal+X (Three+X): ring in Three YZ
].forEach(r=>{
  const ring=new THREE.Mesh(new THREE.TorusGeometry(ringR,ringTube,10,64),
